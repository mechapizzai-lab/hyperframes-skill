<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>May Shorts 6 — Landscape</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Roboto+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #050b13;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      /* Face wrapper holds the source <video> at its native 1920x1080.
         GSAP transforms it between three modes:
           HERO       → translate(0,0) scale(1) — fills canvas
           SIDE       → translate(480,0) scale(1) — face centered in right half;
                         left bleed is masked by the scene panel that sits over it
           INSET      → translate(1340,760) scale(0.27) — small lower-right portrait
         transform-origin: 0 0 so translates compose with scale predictably. */
      #face-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        transform-origin: 0 0;
        transform: translate(0px, 0px) scale(1);
        z-index: 0;
        will-change: transform, opacity;
      }
      #face-video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform-origin: center center;
        /* Subtle short-form color grade — lift contrast, slight saturation bump,
           cool shadows so the face reads punchy against the navy stage. */
        filter: contrast(1.06) saturate(1.06) brightness(0.98);
      }
      #face-wrapper::after {
        /* Soft vignette baked into the face wrapper so the edges sink into
           the surrounding stage in every mode. Scales with the wrapper. */
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          transparent 60%,
          rgba(7, 18, 28, 0.32) 88%,
          rgba(7, 18, 28, 0.7) 100%
        );
      }
      .scene-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="19.5"
      data-width="1920"
      data-height="1080"
    >
      <!-- Ambient background — always on, sits below face -->
      <div
        id="ambient-bg"
        class="scene-layer"
        data-composition-id="ambient-bg"
        data-composition-src="compositions/ambient-bg.html"
        data-start="0"
        data-duration="19.5"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Face video. Wrapper sized at native 1920x1080. GSAP animates it
           between HERO / SIDE / INSET modes at scene boundaries. -->
      <div id="face-wrapper">
        <video
          id="face-video"
          data-start="0"
          data-duration="18.4"
          data-track-index="1"
          src="assets/may_shorts_6.mp4"
          muted
          playsinline
        ></video>
      </div>

      <!-- Audio (separate track for the mixer) -->
      <audio
        id="face-audio"
        data-start="0"
        data-duration="18.4"
        data-track-index="2"
        data-volume="1"
        src="assets/may_shorts_6.mp4"
      ></audio>

      <!-- Scene overlays. Times are word-onset aligned per assets/may_shorts_6.json. -->
      <div
        id="scene-1"
        class="scene-layer"
        data-composition-id="scene1-hook"
        data-composition-src="compositions/scene1-hook.html"
        data-start="0"
        data-duration="2.06"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-2"
        class="scene-layer"
        data-composition-id="scene2-not-needed"
        data-composition-src="compositions/scene2-not-needed.html"
        data-start="2.06"
        data-duration="1.96"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-3"
        class="scene-layer"
        data-composition-id="scene3-flashy-list"
        data-composition-src="compositions/scene3-flashy-list.html"
        data-start="4.02"
        data-duration="2.6"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-4"
        class="scene-layer"
        data-composition-id="scene4-want-list"
        data-composition-src="compositions/scene4-want-list.html"
        data-start="6.62"
        data-duration="2.56"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-5"
        class="scene-layer"
        data-composition-id="scene5-thats-it"
        data-composition-src="compositions/scene5-thats-it.html"
        data-start="9.18"
        data-duration="0.96"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-6"
        class="scene-layer"
        data-composition-id="scene6-boring"
        data-composition-src="compositions/scene6-boring.html"
        data-start="10.14"
        data-duration="3.56"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-7"
        class="scene-layer"
        data-composition-id="scene7-pay-for"
        data-composition-src="compositions/scene7-pay-for.html"
        data-start="13.71"
        data-duration="1.64"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-8"
        class="scene-layer"
        data-composition-id="scene8-cta-outro"
        data-composition-src="compositions/scene8-cta-outro.html"
        data-start="15.36"
        data-duration="4.14"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Captions sit on top of scenes -->
      <div
        id="captions"
        class="scene-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="19.5"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // Face-wrapper modes. Wrapper is fixed 1920x1080, transform-origin: 0 0.
      //   HERO  : identity                            (face fills full canvas)
      //   SIDE  : translate(480, 0) scale(1)          (face center → canvas right-half center;
      //                                                left bleed masked by scene panel)
      //   INSET : translate(1340, 760) scale(0.27)    (≈520x292 lower-right portrait)
      const HERO  = { x: 0,    y: 0,   scale: 1,    opacity: 1 };
      const SIDE  = { x: 480,  y: 0,   scale: 1,    opacity: 1 };
      const INSET = { x: 1340, y: 760, scale: 0.27, opacity: 1 };
      const MODE_DUR = 0.32;

      // Initial state — start in SIDE so scene 1's left panel reads.
      mainTl.set("#face-wrapper", SIDE, 0);

      // Mode changes at scene boundaries. Kicked off 0.15s BEFORE the new
      // scene's content lands so the face has settled by the time the panel
      // arrives. Times are audio-synced scene starts.
      [
        { t: 9.18,  mode: HERO  }, // scene 5 "That's it" punch
        { t: 10.14, mode: SIDE  }, // scene 6 boring panel
        { t: 13.71, mode: HERO  }, // scene 7 PAID stamp
        { t: 15.36, mode: INSET }, // scene 8 CTA outro
      ].forEach(({ t, mode }) => {
        mainTl.to(
          "#face-wrapper",
          { ...mode, duration: MODE_DUR, ease: "expo.inOut" },
          t - 0.15,
        );
      });

      // Face fades out near the end of the CTA hold so the lockup carries the
      // last second. Audio ends at 17.92 — fade face 18.0 → 18.6.
      mainTl.to(
        "#face-wrapper",
        { opacity: 0, duration: 0.6, ease: "power2.in" },
        18.0,
      );

      // Subtle Ken Burns on the face — slow zoom over the audio span. Adds
      // perceptible "camera" motion so a static talking-head never feels frozen.
      mainTl.to(
        "#face-video",
        { scale: 1.03, duration: 18.4, ease: "none" },
        0,
      );

      // Pad to data-duration exactly so no black-frame flash at the tail.
      mainTl.set({}, {}, 19.5);
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
