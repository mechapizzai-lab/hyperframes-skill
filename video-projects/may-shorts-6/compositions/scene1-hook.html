<template id="scene1-hook-template">
  <div
    data-composition-id="scene1-hook"
    data-start="0"
    data-width="1920"
    data-height="1080"
    data-duration="2.06"
  >
    <div class="s1-panel">
      <div class="s1-label">I'VE BUILT</div>
      <div class="s1-big">
        <span class="s1-counter" id="s1-counter">0</span><span class="s1-plus" id="s1-plus">+</span>
      </div>
      <div class="s1-stamp" id="s1-stamp">
        <span>AI WORKFLOWS</span>
        <span class="s1-underline" id="s1-underline"></span>
      </div>
    </div>

    <style>
      [data-composition-id="scene1-hook"] {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene1-hook"] .s1-panel {
        position: absolute;
        top: 0;
        left: 0;
        width: 960px;
        height: 1080px;
        background: linear-gradient(135deg, #07121c 0%, #0a1828 70%, #0d2031 100%);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 20px;
        padding: 80px 100px;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
        /* Soft right edge feathers into the face on the right half */
        mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
        -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
      }
      [data-composition-id="scene1-hook"] .s1-label {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 44px;
        letter-spacing: 0.18em;
        color: #96a2b6;
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-big {
        display: flex;
        align-items: baseline;
        gap: 10px;
        color: #37bdf8;
        font-weight: 900;
        font-size: 360px;
        line-height: 0.9;
        letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 60px rgba(55, 189, 248, 0.45);
      }
      [data-composition-id="scene1-hook"] .s1-plus {
        font-size: 240px;
        color: #f09025;
        opacity: 0;
        transform: scale(0);
        text-shadow: 0 0 50px rgba(240, 144, 37, 0.55);
      }
      [data-composition-id="scene1-hook"] .s1-stamp {
        position: relative;
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 56px;
        letter-spacing: 0.04em;
        color: #ffffff;
        clip-path: inset(0 100% 0 0);
      }
      [data-composition-id="scene1-hook"] .s1-underline {
        position: absolute;
        left: 0;
        bottom: -10px;
        height: 4px;
        width: 100%;
        background: #37bdf8;
        transform: scaleX(0);
        transform-origin: left center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const SCOPE = '[data-composition-id="scene1-hook"] ';
        const tl = gsap.timeline({ paused: true });
        const counter = { val: 0 };
        const el = document.querySelector(SCOPE + ".s1-counter");

        tl.to(SCOPE + ".s1-label", { opacity: 1, duration: 0.32, ease: "power2.out" }, 0.05);
        tl.to(
          counter,
          {
            val: 500,
            duration: 0.65,
            ease: "power2.out",
            snap: { val: 1 },
            onUpdate: function () {
              if (el) el.textContent = Math.round(counter.val);
            },
          },
          0.28,
        );
        tl.to(
          SCOPE + ".s1-plus",
          { opacity: 1, scale: 1, duration: 0.26, ease: "back.out(3)" },
          0.95,
        );
        tl.to(
          SCOPE + ".s1-stamp",
          { clipPath: "inset(0 0% 0 0)", duration: 0.32, ease: "power3.out" },
          1.18,
        );
        tl.to(
          SCOPE + ".s1-underline",
          { scaleX: 1, duration: 0.32, ease: "power2.out" },
          1.5,
        );
        tl.set({}, {}, 2.06);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-hook"] = tl;
      })();
    </script>
  </div>
</template>
