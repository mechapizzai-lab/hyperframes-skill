<template id="scene3-flashy-list-template">
  <div
    data-composition-id="scene3-flashy-list"
    data-start="0"
    data-width="1920"
    data-height="1080"
    data-duration="2.6"
  >
    <div class="s3-panel">
      <div class="s3-label">NOT THIS:</div>
      <div class="s3-row" id="s3-row1">
        <span class="s3-text">FLASHY AUTOMATIONS</span>
        <span class="s3-strike" id="s3-strike1"></span>
      </div>
      <div class="s3-row" id="s3-row2">
        <span class="s3-text">COOL AI DEMOS</span>
        <span class="s3-strike" id="s3-strike2"></span>
      </div>
    </div>

    <style>
      [data-composition-id="scene3-flashy-list"] { position: absolute; inset: 0; }
      [data-composition-id="scene3-flashy-list"] .s3-panel {
        position: absolute;
        top: 0;
        left: 0;
        width: 960px;
        height: 1080px;
        background: linear-gradient(135deg, #07121c 0%, #0a1828 70%, #0d2031 100%);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 36px;
        padding: 80px 100px;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
        mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
        -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 88%, transparent 100%);
      }
      [data-composition-id="scene3-flashy-list"] .s3-label {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 44px;
        letter-spacing: 0.18em;
        color: #f09025;
        opacity: 0;
      }
      [data-composition-id="scene3-flashy-list"] .s3-row {
        position: relative;
        display: inline-block;
        font-weight: 900;
        font-size: 78px;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: rgba(255, 255, 255, 0.55);
        opacity: 0;
        transform: translateX(-30px);
      }
      [data-composition-id="scene3-flashy-list"] .s3-strike {
        position: absolute;
        left: -10px;
        top: 50%;
        height: 7px;
        width: calc(100% + 20px);
        background: #f09025;
        transform-origin: left center;
        transform: scaleX(0);
        box-shadow: 0 0 18px rgba(240, 144, 37, 0.6);
        margin-top: -3px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const SCOPE = '[data-composition-id="scene3-flashy-list"] ';
        const tl = gsap.timeline({ paused: true });

        tl.to(SCOPE + ".s3-label", { opacity: 1, duration: 0.28, ease: "power2.out" }, 0.05);
        tl.to(
          SCOPE + "#s3-row1",
          { opacity: 1, x: 0, duration: 0.34, ease: "power3.out" },
          0.3,
        );
        tl.to(
          SCOPE + "#s3-strike1",
          { scaleX: 1, duration: 0.32, ease: "power2.out" },
          0.7,
        );
        tl.to(
          SCOPE + "#s3-row2",
          { opacity: 1, x: 0, duration: 0.34, ease: "power3.out" },
          1.32,
        );
        tl.to(
          SCOPE + "#s3-strike2",
          { scaleX: 1, duration: 0.32, ease: "power2.out" },
          1.7,
        );
        tl.set({}, {}, 2.6);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene3-flashy-list"] = tl;
      })();
    </script>
  </div>
</template>
