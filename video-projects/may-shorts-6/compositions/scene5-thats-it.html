<template id="scene5-thats-it-template">
  <div
    data-composition-id="scene5-thats-it"
    data-start="0"
    data-width="1920"
    data-height="1080"
    data-duration="0.96"
  >
    <!-- HERO mode: face is full-screen behind. We overlay a centered punch
         badge with a quick burst — top-of-frame so face stays visible. -->
    <div class="s5-burst" id="s5-burst"></div>
    <div class="s5-card" id="s5-card">
      <div class="s5-text">THAT'S<br/>IT.</div>
    </div>

    <style>
      [data-composition-id="scene5-thats-it"] { position: absolute; inset: 0; }
      [data-composition-id="scene5-thats-it"] .s5-burst {
        position: absolute;
        left: 50%;
        top: 22%;
        width: 800px;
        height: 800px;
        margin-left: -400px;
        margin-top: -400px;
        background: radial-gradient(
          circle at center,
          rgba(240, 144, 37, 0.45) 0%,
          rgba(240, 144, 37, 0.18) 30%,
          transparent 65%
        );
        opacity: 0;
        transform: scale(0.4);
        will-change: transform, opacity;
      }
      [data-composition-id="scene5-thats-it"] .s5-card {
        position: absolute;
        left: 50%;
        top: 18%;
        transform: translateX(-50%) translateY(20px) scale(0.85);
        opacity: 0;
        text-align: center;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 200px;
        line-height: 0.95;
        letter-spacing: -0.04em;
        color: #ffffff;
        text-shadow:
          -4px -4px 0 #07121c,
          4px -4px 0 #07121c,
          -4px 4px 0 #07121c,
          4px 4px 0 #07121c,
          -5px 0 0 #07121c,
          5px 0 0 #07121c,
          0 -5px 0 #07121c,
          0 5px 0 #07121c,
          0 0 60px rgba(240, 144, 37, 0.55);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const SCOPE = '[data-composition-id="scene5-thats-it"] ';
        const tl = gsap.timeline({ paused: true });

        tl.to(
          SCOPE + "#s5-burst",
          { opacity: 1, scale: 1, duration: 0.22, ease: "power3.out" },
          0,
        );
        tl.to(
          SCOPE + "#s5-burst",
          { opacity: 0, scale: 1.3, duration: 0.55, ease: "power2.in" },
          0.22,
        );
        tl.to(
          SCOPE + "#s5-card",
          {
            opacity: 1,
            scale: 1,
            y: 0,
            duration: 0.3,
            ease: "back.out(2.4)",
          },
          0.05,
        );
        tl.to(
          SCOPE + "#s5-card",
          { opacity: 0, y: -16, duration: 0.22, ease: "power2.in" },
          0.78,
        );

        tl.set({}, {}, 0.96);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene5-thats-it"] = tl;
      })();
    </script>
  </div>
</template>
