<template id="scene8-cta-outro-template">
  <div
    data-composition-id="scene8-cta-outro"
    data-start="0"
    data-width="1920"
    data-height="1080"
    data-duration="4.14"
  >
    <!-- INSET mode: face shrinks to lower-right (handled in root index.html).
         This composition fills the rest of the canvas with the CTA lockup. -->
    <div class="s8-stage">
      <!-- Logo crystallizes from below -->
      <img class="s8-logo" id="s8-logo" src="assets/MechaPizzAI Logo.png" alt="MechaPizzAI" />

      <!-- Main CTA -->
      <div class="s8-cta" id="s8-cta">
        <span class="s8-cta-pre">COMMENT</span>
        <span class="s8-cta-key" id="s8-cta-key">500W</span>
      </div>

      <!-- Brand wordmark beneath -->
      <div class="s8-wordmark" id="s8-wordmark">
        <span>MECHAPIZZAI</span>
        <span class="s8-wordmark-bar" id="s8-wordmark-bar"></span>
      </div>

      <!-- Shimmer-sweep glint that passes diagonally across the lockup at +1.5s -->
      <div class="s8-shimmer" id="s8-shimmer"></div>
    </div>

    <style>
      [data-composition-id="scene8-cta-outro"] { position: absolute; inset: 0; }
      [data-composition-id="scene8-cta-outro"] .s8-stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 28px;
        padding: 100px 120px;
        box-sizing: border-box;
        font-family: "Space Grotesk", sans-serif;
        overflow: hidden;
      }
      [data-composition-id="scene8-cta-outro"] .s8-logo {
        width: 220px;
        height: auto;
        opacity: 0;
        transform: translateY(40px) scale(0.92);
        filter: drop-shadow(0 0 24px rgba(255, 106, 13, 0.7));
      }
      [data-composition-id="scene8-cta-outro"] .s8-cta {
        display: flex;
        align-items: baseline;
        gap: 36px;
        font-weight: 900;
        font-size: 220px;
        line-height: 0.95;
        letter-spacing: -0.03em;
        color: #ffffff;
        text-shadow:
          0 0 60px rgba(255, 106, 13, 0.35),
          0 6px 20px rgba(0, 0, 0, 0.55);
        opacity: 0;
        transform: translateY(30px);
      }
      [data-composition-id="scene8-cta-outro"] .s8-cta-pre {
        color: rgba(255, 255, 255, 0.78);
        font-weight: 700;
        font-size: 130px;
      }
      [data-composition-id="scene8-cta-outro"] .s8-cta-key {
        color: #ff6a0d;
        text-shadow:
          0 0 36px rgba(255, 106, 13, 0.7),
          0 0 80px rgba(255, 48, 0, 0.4);
      }
      [data-composition-id="scene8-cta-outro"] .s8-wordmark {
        position: relative;
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 48px;
        letter-spacing: 0.22em;
        color: #ffffff;
        opacity: 0;
        padding-bottom: 16px;
      }
      [data-composition-id="scene8-cta-outro"] .s8-wordmark-bar {
        position: absolute;
        left: 0;
        bottom: 0;
        height: 3px;
        width: 100%;
        background: linear-gradient(90deg, #ff6a0d 0%, #00d4ff 100%);
        transform: scaleX(0);
        transform-origin: left center;
      }
      [data-composition-id="scene8-cta-outro"] .s8-shimmer {
        position: absolute;
        top: 0;
        left: -40%;
        width: 30%;
        height: 100%;
        background: linear-gradient(
          110deg,
          rgba(13, 10, 7, 0) 0%,
          rgba(255, 255, 255, 0.18) 50%,
          rgba(13, 10, 7, 0) 100%
        );
        opacity: 0;
        pointer-events: none;
        filter: blur(6px);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const SCOPE = '[data-composition-id="scene8-cta-outro"] ';
        const tl = gsap.timeline({ paused: true });

        // Logo crystallizes from below
        tl.to(
          SCOPE + "#s8-logo",
          {
            opacity: 1,
            y: 0,
            scale: 1,
            duration: 0.55,
            ease: "back.out(1.6)",
          },
          0.1,
        );

        // CTA card lands
        tl.to(
          SCOPE + "#s8-cta",
          { opacity: 1, y: 0, duration: 0.42, ease: "power3.out" },
          0.45,
        );

        // Key word gets a small accent pop slightly delayed
        tl.fromTo(
          SCOPE + "#s8-cta-key",
          { scale: 0.92 },
          { scale: 1.06, duration: 0.22, ease: "back.out(3)" },
          0.78,
        );
        tl.to(
          SCOPE + "#s8-cta-key",
          { scale: 1, duration: 0.32, ease: "power2.out" },
          1.0,
        );

        // Wordmark fades in with bar wipe
        tl.to(
          SCOPE + "#s8-wordmark",
          { opacity: 1, duration: 0.4, ease: "power2.out" },
          1.0,
        );
        tl.to(
          SCOPE + "#s8-wordmark-bar",
          { scaleX: 1, duration: 0.55, ease: "power3.out" },
          1.15,
        );

        // Shimmer-sweep at +1.8s into the hold
        tl.set(SCOPE + "#s8-shimmer", { opacity: 1 }, 1.8);
        tl.fromTo(
          SCOPE + "#s8-shimmer",
          { x: 0 },
          { x: "1500%", duration: 1.0, ease: "power2.inOut" },
          1.8,
        );
        tl.set(SCOPE + "#s8-shimmer", { opacity: 0 }, 2.85);

        tl.set({}, {}, 4.14);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene8-cta-outro"] = tl;
      })();
    </script>
  </div>
</template>
