<template id="beat-1-hook-template">
  <div
    data-composition-id="beat-1-hook"
    data-start="0"
    data-duration="3.95"
    data-width="1920"
    data-height="1080"
  >
    <!-- Frosted-glass hero card docked to the left, matching the Beat 4 agent
         panel's aesthetic language: translucent gradient, backdrop-blur,
         thin border, deep drop-shadow. Holds the logo + headline without
         covering Nate's face (his body stays to the right of the card). -->
    <div class="b1-card">
      <img class="b1-logo" src="assets/claude-logo.png" alt="Claude" />
      <div class="b1-agent-title">
        <div class="b1-eyebrow">CLAUDE</div>
        <div class="b1-agent-name">hyperframes.ai</div>
      </div>
      <div class="b1-headline">
        <div class="b1-line-1">Video editing</div>
        <div class="b1-line-2">unlocked.</div>
      </div>
      <div class="b1-underline"></div>
    </div>

    <style>
      [data-composition-id="beat-1-hook"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }
      [data-composition-id="beat-1-hook"] .b1-card {
        position: absolute;
        top: 50%;
        left: 80px;
        transform: translateY(-50%);
        width: 640px;
        padding: 48px 52px 44px;
        background: linear-gradient(
          150deg,
          rgba(255, 255, 255, 0.07),
          rgba(255, 255, 255, 0.02) 45%,
          rgba(217, 119, 87, 0.08)
        );
        backdrop-filter: blur(18px) saturate(1.25);
        -webkit-backdrop-filter: blur(18px) saturate(1.25);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 24px;
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 0 60px rgba(217, 119, 87, 0.12);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 28px;
      }
      [data-composition-id="beat-1-hook"] .b1-logo {
        width: 132px;
        height: auto;
        filter:
          drop-shadow(0 0 32px rgba(217, 119, 87, 0.80))
          drop-shadow(0 0 64px rgba(217, 119, 87, 0.35));
      }
      [data-composition-id="beat-1-hook"] .b1-agent-title {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      [data-composition-id="beat-1-hook"] .b1-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.46em;
        padding-left: 0.46em;
        color: #d97757;
        text-shadow: 0 0 16px rgba(217, 119, 87, 0.65);
      }
      [data-composition-id="beat-1-hook"] .b1-agent-name {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.78);
        letter-spacing: 0.01em;
      }
      [data-composition-id="beat-1-hook"] .b1-headline {
        font-weight: 800;
        line-height: 0.98;
        letter-spacing: -0.02em;
      }
      [data-composition-id="beat-1-hook"] .b1-line-1,
      [data-composition-id="beat-1-hook"] .b1-line-2 {
        font-size: 84px;
        background: linear-gradient(180deg, #ffffff 0%, #c8c8c8 62%, #ededed 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 22px rgba(255, 255, 255, 0.35),
          0 0 44px rgba(255, 255, 255, 0.14);
      }
      [data-composition-id="beat-1-hook"] .b1-line-2 {
        background: linear-gradient(180deg, #ffffff 0%, #f5b39a 50%, #d97757 100%);
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow:
          0 0 26px rgba(217, 119, 87, 0.55),
          0 0 52px rgba(217, 119, 87, 0.22);
      }
      [data-composition-id="beat-1-hook"] .b1-underline {
        width: 140px;
        height: 5px;
        background: linear-gradient(
          90deg,
          #d97757,
          rgba(217, 119, 87, 0)
        );
        border-radius: 3px;
        box-shadow: 0 0 20px rgba(217, 119, 87, 0.75);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="beat-1-hook"]';

        // Card slides in from the left with a blur-clear, same language as the
        // Beat 4 agent panel so the two reads feel like the same design system.
        tl.from(`${root} .b1-card`,
          { x: -60, opacity: 0, filter: "blur(14px)",
            duration: 0.65, ease: "power3.out" }, 0.20);

        // Logo springs in with an overshoot + halo bloom.
        tl.from(`${root} .b1-logo`,
          { scale: 0.55, opacity: 0, duration: 0.55,
            ease: "back.out(1.8)" }, 0.55);

        // Brand labels fade up.
        tl.from(`${root} .b1-eyebrow`,
          { opacity: 0, x: -12, duration: 0.35, ease: "expo.out" }, 0.85);
        tl.from(`${root} .b1-agent-name`,
          { opacity: 0, x: -12, duration: 0.35, ease: "power3.out" }, 0.95);

        // Headline lines stagger — "Video editing" lands on "complete" (1.82),
        // "unlocked." lands as he says "editing videos" (~2.90).
        tl.from(`${root} .b1-line-1`,
          { y: 40, opacity: 0, filter: "blur(14px)",
            duration: 0.6, ease: "power3.out" }, 1.70);
        tl.from(`${root} .b1-line-2`,
          { y: 40, opacity: 0, filter: "blur(18px)", scale: 0.94,
            duration: 0.65, ease: "power4.out" }, 2.80);

        // Orange underline sweeps in after "unlocked." lands.
        tl.from(`${root} .b1-underline`,
          { width: 0, opacity: 0, duration: 0.5, ease: "expo.out" }, 3.15);

        // Continuous subtle logo halo breath.
        gsap.to(`${root} .b1-logo`,
          { filter: "drop-shadow(0 0 44px rgba(217,119,87,0.95)) drop-shadow(0 0 80px rgba(217,119,87,0.45))",
            duration: 0.9, repeat: 4, yoyo: true, ease: "sine.inOut" });

        // Duration anchor (Law #11).
        tl.to({}, { duration: 3.95 }, 0);
        window.__timelines["beat-1-hook"] = tl;
      })();
    </script>
  </div>
</template>
