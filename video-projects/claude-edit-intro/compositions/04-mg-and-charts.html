    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (() => {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="beat-4-mg"]';

        // Beat starts at master 8.64. Words:
        //   "motion" @ 9.08 → local 0.44   (agent panel kicks in here)
        //   "charts" @ 9.98 → local 1.34   (chart panel kicks in here)

        // -------- LEFT agent panel --------
        tl.from(`[data-composition-id="beat-4-mg"] .b4-agent`,
          { x: -80, opacity: 0, filter: "blur(16px)",
            duration: 0.55, ease: "power3.out" }, 0.44);
        tl.from(`[data-composition-id="beat-4-mg"] .b4-agent-eyebrow`,
          { x: -10, opacity: 0, duration: 0.3, ease: "expo.out" }, 0.58);
        tl.from(`[data-composition-id="beat-4-mg"] .b4-agent-name`,
          { x: -12, opacity: 0, duration: 0.35, ease: "power3.out" }, 0.66);
        // Ring fills from 0 → full in 1.1s.
        tl.to(`[data-composition-id="beat-4-mg"] .b4-ring-fg`,
          { strokeDashoffset: 0, duration: 1.1, ease: "power2.out" }, 0.60);
        // Ring dot spins around the perimeter — finite spin (2 full rotations in
        // ~3.5s covers the agent active window).
        gsap.to(`[data-composition-id="beat-4-mg"] .b4-ring`,
          { rotate: 720, transformOrigin: "50% 50%",
            duration: 3.5, ease: "none",
            delay: 0.60 });

        // Log lines type in sequentially on their data-at timings.
        document.querySelectorAll(`[data-composition-id="beat-4-mg"] .b4-log-line`).forEach((el) => {
          const at = parseFloat(el.getAttribute("data-at"));
          tl.from(el,
            { x: -20, opacity: 0, duration: 0.35, ease: "power3.out" }, at);
        });

        // -------- RIGHT chart panel --------
        tl.from(`[data-composition-id="beat-4-mg"] .b4-chart`,
          { x: 80, opacity: 0, filter: "blur(16px)",
            duration: 0.55, ease: "power3.out" }, 1.34);
        tl.from(`[data-composition-id="beat-4-mg"] .b4-chart-eyebrow`,
          { x: 14, opacity: 0, duration: 0.3, ease: "expo.out" }, 1.48);
        // Count-up on the +248% number using onUpdate.
        const titleEl = document.querySelector(`[data-composition-id="beat-4-mg"] .b4-chart-title`);
        const counter = { v: 0 };
        tl.to(counter,
          { v: 248, duration: 1.1, ease: "power2.out",
            onUpdate: () => {
              titleEl.innerHTML = "+" + Math.round(counter.v) +
                '<span class="b4-chart-unit">%</span>';
            } }, 1.56);
        tl.from(`[data-composition-id="beat-4-mg"] .b4-chart-sub`,
          { y: 8, opacity: 0, duration: 0.35, ease: "power2.out" }, 1.64);
        // Bars pop up staggered.
        tl.from(`[data-composition-id="beat-4-mg"] .b4-bar`,
          { scaleY: 0, opacity: 0, duration: 0.45, ease: "back.out(1.4)",
            stagger: 0.08 }, 1.76);
        // Line path draws.
        tl.to(`[data-composition-id="beat-4-mg"] .b4-line-path`,
          { strokeDashoffset: 0, duration: 0.9, ease: "power2.out" }, 2.12);
        // Dot pulses after line completes.
        gsap.to(`[data-composition-id="beat-4-mg"] .b4-line-dot`,
          { attr: { r: 12 }, duration: 0.45, repeat: 3, yoyo: true,
            ease: "sine.inOut", delay: 3.1 });

        // Pre-seam fade — face-wrapper begins shrinking at master 12.54 (local
        // 3.90) and progressively uncovers the left region where .b4-agent sits
        // ("editing.loop()"). Fade both panels out to opacity 0 just before that
        // reveal so nothing flashes during the beat-4 → beat-5 PIP transition.
        tl.to(
          `[data-composition-id="beat-4-mg"] .b4-agent, [data-composition-id="beat-4-mg"] .b4-chart`,
          { opacity: 0, duration: 0.30, ease: "power2.in" },
          3.60
        );

        // Parent moves on at master 12.84.
        tl.to({}, { duration: 4.20 }, 0);
        window.__timelines["beat-4-mg"] = tl;
      })();
    </script>
