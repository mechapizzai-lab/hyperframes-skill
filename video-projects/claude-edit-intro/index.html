<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Claude Edit Intro</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #05080f;
        font-family: "Inter", sans-serif;
        color: #ffffff;
      }
      /* -------- Face-cam wrapper --------
         Wrapper is a plain <div>; it's what GSAP animates (never the <video> itself
         — animating dimensions on a <video> freezes frames). The <video> inside is
         width:auto, height:100%, centered via translateX(-50%). When the wrapper
         shrinks to a narrow box (Beat 5, 540x960), the wrapper's overflow:hidden
         crops the landscape source into a 9:16 portrait window automatically. */
      #face-wrapper {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        transform-origin: 0 0;
        z-index: 0;
        background: #000;
      }
      #face-video {
        position: absolute;
        top: 0;
        left: 50%;
        height: 100%;
        width: auto;
        transform: translateX(-50%);
        display: block;
        filter: contrast(1.05) saturate(1.08);
      }
      /* Beat-5 PiP dress — rounded corners + drop shadow appear only when the
         wrapper has shrunk. We toggle these via the .pip class so they don't
         affect beats 1-4. */
      #face-wrapper.pip {
        /* Beat 5 only — face must sit on top of the scene-layer so the PiP
           dock reads. Beats 1-4 intentionally layer the scene overlays over
           the face, so z-index stays at 0 until .pip is toggled (12.54s). */
        z-index: 10;
        border-radius: 36px;
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset,
          0 0 60px rgba(217, 119, 87, 0.25);
      }
      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="claude-edit-intro"
      data-start="0"
      data-duration="23.17"
      data-width="1920"
      data-height="1080"
    >
      <!-- Face video + music live inside the composition so asset paths resolve
           relative to the project. The face-wrapper is a non-timed <div> so GSAP
           can animate it without touching the <video> element (which would
           freeze). The lint warning about "video_nested_in_timed_element" is a
           false positive for this pattern — may-shorts-19 renders the same way. -->
      <div id="face-wrapper">
        <video
          id="face-video"
          data-start="0"
          data-duration="23.17"
          data-track-index="0"
          src="assets/claude-edit-intro.mp4"
          muted
          playsinline
        ></video>
      </div>
      <audio
        id="face-audio"
        data-start="0"
        data-duration="23.17"
        data-track-index="2"
        data-volume="1"
        src="assets/claude-edit-intro.mp4"
      ></audio>
      <!-- BEAT 1 — hook: Claude logo + "Video editing unlocked" on left half.
           Timed to the full intro sentence ("Today, I'm going to show you guys...
           complete game changer for editing videos"). Logo pulses; headline lands
           on the word "editing videos". -->
      <div
        id="beat-1"
        class="scene-layer"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/01-hook.html"
        data-start="0"
        data-duration="3.95"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 2 — "text on screen, like up here". Text slams at word "text" (4.36)
           with a chevron pointing at Nate's hand gesture. -->
      <div
        id="beat-2"
        class="scene-layer"
        data-composition-id="beat-2-text"
        data-composition-src="compositions/02-text-on-screen.html"
        data-start="3.95"
        data-duration="1.99"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 3 — karaoke captions for "or whether that's subtitles down at the
           bottom, like right here". Active-word highlights sync to Whisper onsets. -->
      <div
        id="beat-3"
        class="scene-layer"
        data-composition-id="beat-3-karaoke"
        data-composition-src="compositions/03-karaoke-captions.html"
        data-start="5.94"
        data-duration="2.70"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 4 — split-screen: AI agent activity on the LEFT (when he says
           "motion graphics", 9.08s local 0.44s), bar+line chart on the RIGHT
           (when he says "charts", 9.98s local 1.34s). Holds through "pretty much
           anything" so the demo reads before beat 5 takes over. -->
      <div
        id="beat-4"
        class="scene-layer"
        data-composition-id="beat-4-mg"
        data-composition-src="compositions/04-mg-and-charts.html"
        data-start="8.64"
        data-duration="4.20"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- BEAT 5 — PiP mode. Face shrinks to 540x960 docked right; left ~1380px
           holds starfield + grid BG, cycles three side hits, ends on outro CTA. -->
      <div
        id="beat-5"
        class="scene-layer"
        data-composition-id="beat-5-pip"
        data-composition-src="compositions/05-pip.html"
        data-start="12.84"
        data-duration="10.33"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // ------------ Face-wrapper modes ------------
      // Wrapper is 1920x1080 (matches source dimensions).
      //   FULL (Beats 1–4, 0–12.84s)    — full frame 1920x1080, face center-framed.
      //                                   Beat 1's hero reveal lives in the top
      //                                   ~300px band so the face stays unobstructed.
      //   PIP  (Beat 5, 12.84–23.17s)   — 540x960 docked right at x=1340, y=60.
      const FULL = { x: 0, y: 0, width: 1920, height: 1080 };
      const PIP  = { x: 1340, y: 60, width: 540, height: 960 };

      // Beats 1-4 stay at FULL — no wrapper tweens; sub-comp overlays do all work.
      gsap.set("#face-wrapper", FULL);

      // Beat 4 → Beat 5 seam (12.54 → 13.14) — 0.6s shrink centered on the word
      // "move" (13.12). Starts 0.30s early so it's mid-flight at the word onset.
      // Use power3.inOut for a premium mechanical feel; the body reframe lands as
      // his gesture is mid-motion.
      mainTl.to("#face-wrapper",
        { ...PIP, duration: 0.60, ease: "power3.inOut",
          onStart: () => document.getElementById("face-wrapper").classList.add("pip") },
        12.54);

      // Pad anchor to guarantee timeline.duration() >= data-duration (Law #11).
      mainTl.to({}, { duration: 23.17 }, 0);
      window.__timelines["claude-edit-intro"] = mainTl;
    </script>
  </body>
</html>
