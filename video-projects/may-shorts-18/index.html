<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>May Shorts 18 — Vertical</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #07121c;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      #face-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        transform-origin: 0 0;
        transform: translate(-180px, 1110px) scale(0.75);
        z-index: 0;
      }
      #face-video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform-origin: center center;
        filter: contrast(1.08) saturate(1.08) brightness(0.97);
      }
      #face-wrapper::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          transparent 55%,
          rgba(7, 18, 28, 0.35) 85%,
          rgba(7, 18, 28, 0.7) 100%
        );
      }
      .scene-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="19.82"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="ambient-bg"
        class="scene-layer"
        data-composition-id="ambient-bg"
        data-composition-src="compositions/ambient-bg.html"
        data-start="0"
        data-duration="19.82"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <div id="face-wrapper">
        <video
          id="face-video"
          data-start="0"
          data-duration="17.12"
          data-track-index="0"
          src="assets/may_shorts_18.mp4"
          muted
          playsinline
        ></video>
      </div>

      <div
        id="seam-treatment"
        class="scene-layer"
        data-composition-id="seam-treatment"
        data-composition-src="compositions/seam-treatment.html"
        data-start="0"
        data-duration="19.82"
        data-track-index="5"
        data-width="1080"
        data-height="1920"
      ></div>

      <audio
        id="face-audio"
        data-start="0"
        data-duration="17.12"
        data-track-index="4"
        data-volume="1"
        src="assets/may_shorts_18.mp4"
      ></audio>

      <!-- Scene overlays — back-to-back on track 1, no gaps. -->
      <div
        id="scene-1"
        class="scene-layer"
        data-composition-id="scene1-hook-killed"
        data-composition-src="compositions/scene1-hook-killed.html"
        data-start="0"
        data-duration="2.36"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-2"
        class="scene-layer"
        data-composition-id="scene2-not-hype"
        data-composition-src="compositions/scene2-not-hype.html"
        data-start="2.36"
        data-duration="1.50"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-3"
        class="scene-layer"
        data-composition-id="scene3-three-wins"
        data-composition-src="compositions/scene3-three-wins.html"
        data-start="3.86"
        data-duration="3.52"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-4"
        class="scene-layer"
        data-composition-id="scene4-felt-it"
        data-composition-src="compositions/scene4-felt-it.html"
        data-start="7.38"
        data-duration="2.94"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-5"
        class="scene-layer"
        data-composition-id="scene5-too-late"
        data-composition-src="compositions/scene5-too-late.html"
        data-start="10.32"
        data-duration="3.50"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-6"
        class="scene-layer"
        data-composition-id="scene6-comment-cta"
        data-composition-src="compositions/scene6-comment-cta.html"
        data-start="13.82"
        data-duration="6.00"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="captions"
        class="scene-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="19.82"
        data-track-index="2"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Unifying film-grain texture — sits above everything visual so it
           reads as "shot, not screenshotted." MOTION_PHILOSOPHY §2.1 / Law #10. -->
      <div
        id="grain-overlay"
        class="scene-layer"
        data-composition-id="grain-overlay"
        data-composition-src="compositions/grain-overlay.html"
        data-start="0"
        data-duration="19.82"
        data-track-index="20"
        data-width="1080"
        data-height="1920"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // Three face modes — BOTTOM (bottom-half, zoomed to kill studio dead space),
      // FULLSCREEN (cropped-cover fill), HIDDEN (opacity 0 for MG-only scenes).
      // BOTTOM: wrapper 1920x1080 * scale 0.75 => 1440x810 visible, centered in
      // 1080 canvas (x=-180 crops 180px each side) and bottom-anchored (y=1110).
      const BOTTOM     = { x: -180,    y: 1110, scale: 0.75,   opacity: 1 };
      const FULLSCREEN = { x: -1166.5, y: 0,    scale: 1.7778, opacity: 1 };
      const HIDDEN     = { x: -180,    y: 1110, scale: 0.75,   opacity: 0 };
      const MODE_DUR = 0.32;

      // Scene 1 is BOTTOM — initial state matches.
      mainTl.set("#face-wrapper", BOTTOM, 0);

      // Face-mode changes at scene boundaries. Default: start 0.15s BEFORE the
      // new scene so the face settles by overlay-land. Scene 1→2 is promoted to
      // a longer, earlier transition (0.30s pre-roll, 0.50s duration) to bridge
      // the BOTTOM→FULLSCREEN seam fluidly.
      [
        { t: 2.06,  mode: FULLSCREEN, dur: 0.50 }, // s2 — longer, earlier bridge
        { t: 3.71,  mode: HIDDEN,     dur: 0.32 }, // s3 — MG-only
        { t: 7.23,  mode: BOTTOM,     dur: 0.32 }, // s4 — grounded storytelling
        { t: 10.17, mode: HIDDEN,     dur: 0.32 }, // s5 — MG-only jaw-dropper
        { t: 13.67, mode: BOTTOM,     dur: 0.32 }, // s6 — CTA
      ].forEach(({ t, mode, dur }) => {
        mainTl.to(
          "#face-wrapper",
          { ...mode, duration: dur, ease: "expo.inOut" },
          t,
        );
      });

      // Ken Burns — subtle zoom on the face for the full 17.12s it's visible.
      mainTl.to(
        "#face-video",
        { scale: 1.025, duration: 17.12, ease: "none" },
        0,
      );

      // Face-wrapper fades out at the source end so the 2.7s extended outro
      // hold sits on the CTA alone (MOTION_PHILOSOPHY Law #9 — hero stillness).
      // Fade completes at 17.12 so it lines up with the video's natural end.
      mainTl.to(
        "#face-wrapper",
        { opacity: 0, duration: 0.32, ease: "power2.inOut" },
        16.80,
      );

      mainTl.set({}, {}, 19.82);
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
