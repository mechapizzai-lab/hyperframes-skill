  <div

    data-start="0"

    data-height="1920"
    data-duration="2.36"
  >
    <div class="s1-whip-wrap">
    <div class="s1-panel" id="s1-panel">
      <!-- Top-right sports-chyron label — establishes the "VS" frame -->
      <div class="s1-chyron" id="s1-chyron">

      <!-- KILLED stamp slams in on "killed" word @ local 0.48 -->
      <div class="s1-killed" id="s1-killed">KILLED</div>
    </div>
    </div>

    <style>
      [data-composition-id="scene1-hook-killed"] {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene1-hook-killed"] .s1-whip-wrap {
        position: absolute;
        inset: 0;
        will-change: transform, filter;
      }
      [data-composition-id="scene1-hook-killed"] .s1-panel {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 960px;
        background: #07121c;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
      }
      [data-composition-id="scene1-hook-killed"] .s1-chyron {
        position: absolute;

      }
      [data-composition-id="scene1-hook-killed"] .s1-chyron-dot {

      [data-composition-id="scene1-hook-killed"] .s1-scan {

          90deg,

      }
      [data-composition-id="scene1-hook-killed"] .s1-vs {

      [data-composition-id="scene1-hook-killed"] .s1-claude {

        text-shadow:
          0 0 48px rgba(55, 189, 248, 0.55),

      [data-composition-id="scene1-hook-killed"] .s1-vs-label {

      [data-composition-id="scene1-hook-killed"] .s1-strike {

        );
        box-shadow: 0 0 20px rgba(240, 144, 37, 0.8);
        transform: translateY(-50%) rotate(-6deg) scaleX(0);
        transform-origin: left center;
      }
      [data-composition-id="scene1-hook-killed"] .s1-killed {
        position: absolute;
        top: 620px;
        left: 50%;
        padding: 20px 52px;
        border: 4px solid #07121c;

        background: #f09025;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 128px;
        letter-spacing: -0.02em;
        color: #07121c;
        text-shadow: 0 4px 0 rgba(7, 18, 28, 0.4);
        box-shadow:
          0 0 60px rgba(240, 144, 37, 0.55),
          0 18px 40px rgba(0, 0, 0, 0.5);

        transform: translate(-50%, -50%) scale(0.3) rotate(-10deg);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene1-hook-killed"] ';

        // Scan line sweep across the top — frame has motion from t=0.
        tl.fromTo(
          scope + "#s1-scan",
          { x: "-100%" },
          { x: "100%", duration: 0.7, ease: "power2.inOut" },
          0.0,
        );

        // Chyron label fades in.
        tl.to(
          scope + "#s1-chyron",
          { opacity: 1, duration: 0.28, ease: "power2.out" },
          0.08,
        );

        // "Claude" @ 0.00 — slam in from left with scale + tremor.
        tl.to(
          scope + "#s1-claude",
          {
            opacity: 1,
            x: 0,
            duration: 0.36,
            ease: "back.out(2.2)",
          },
          0.02,
        );
        // Micro-tremor on CLAUDE after it lands.
        tl.to(
          scope + "#s1-claude",
          {
            x: 6,
            duration: 0.04,
            yoyo: true,
            repeat: 3,
            ease: "power1.inOut",
          },
          0.38,
        );

        // "just" @ 0.28 — VS label fades in between.
        tl.to(
          scope + "#s1-vs-label",
          { opacity: 1, duration: 0.2, ease: "power2.out" },
          0.28,
        );

        // "chat GPT" @ 0.68 — CHATGPT slides in from right.
        tl.to(
          scope + "#s1-chatgpt",
          {
            opacity: 1,
            x: 0,
            duration: 0.32,
            ease: "power3.out",
          },
          0.66,
        );

        // KILLED stamp lands AFTER CHATGPT is fully visible (CHATGPT settles
        // @ 0.98). Delayed from original 0.46 -> 1.04 so the reveal reads:
        // Claude -> ChatGPT -> (viewer registers the target) -> KILLED slam.
        tl.to(
          scope + "#s1-killed",
          {
            opacity: 1,
            scale: 1,
            rotation: -4,
            duration: 0.34,
            ease: "back.out(2.8)",
          },
          1.04,
        );
        // KILLED tremor
        tl.to(
          scope + "#s1-killed",
          {
            rotation: -2,
            duration: 0.06,
            yoyo: true,
            repeat: 3,
            ease: "power1.inOut",
          },
          1.42,
        );

        // Strike bar sweeps across CHATGPT just after KILLED lands.
        tl.to(
          scope + "#s1-strike",
          {
            scaleX: 1,
            duration: 0.28,
            ease: "power3.out",
          },
          1.26,
        );

        // Secondary motion — CHATGPT dims after strike.
        tl.to(
          scope + "#s1-chatgpt",
          {
            color: "rgba(255, 255, 255, 0.45)",
            duration: 0.24,
            ease: "power2.out",
          },
          1.58,
        );

        // Subtle CLAUDE pulse through the remaining ~0.6s.
        tl.to(
          scope + "#s1-claude",
          {
            textShadow:
              "0 0 72px rgba(55, 189, 248, 0.8), 0 6px 0 #07121c, 0 14px 40px rgba(0, 0, 0, 0.6)",
            duration: 0.4,
            yoyo: true,
            repeat: 1,
            ease: "sine.inOut",
          },
          1.70,
        );

        // EXIT WHIP — whole wrapper slides up with blur (MOTION_PHILOSOPHY
        // §2.4 "Cut-the-curve vertical whip"). Aligned with the S1→S2 face-mode
        // bridge that starts at global 2.06s — both motions travel together.
        tl.to(
          scope + ".s1-whip-wrap",
          {
            y: -120,
            filter: "blur(24px)",
            opacity: 0,
            duration: 0.3,
            ease: "power2.in",
          },
          2.06,
        );

        tl.set({}, {}, 2.36);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-hook-killed"] = tl;
      })();
    </script>
  </div>
</template>
