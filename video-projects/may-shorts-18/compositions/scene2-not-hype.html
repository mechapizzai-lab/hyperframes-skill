<template id="scene2-not-hype-template">
  <div
    data-composition-id="scene2-not-hype"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="1.50"
  >
    <!-- Face is FULLSCREEN during this scene — overlay minimal typography
         in the top area where it doesn't cover facial features. -->
    <div class="s2-whip-wrap">
    <div class="s2-stack">
      <div class="s2-chip s2-chip-old" id="s2-chip-old">
        <span class="s2-chip-label">NOT HYPE</span>
        <svg class="s2-x" viewBox="0 0 80 80">
          <line
            id="s2-x1"
            x1="16" y1="16" x2="64" y2="64"
            stroke="#f09025" stroke-width="9" stroke-linecap="round"
            pathLength="1"
            stroke-dasharray="1"
            stroke-dashoffset="1"
          />
          <line
            id="s2-x2"
            x1="64" y1="16" x2="16" y2="64"
            stroke="#f09025" stroke-width="9" stroke-linecap="round"
            pathLength="1"
            stroke-dasharray="1"
            stroke-dashoffset="1"
          />
        </svg>
      </div>

      <div class="s2-arrow" id="s2-arrow">▾</div>

      <div class="s2-chip s2-chip-new" id="s2-chip-new">
        <span class="s2-chip-label s2-chip-label-new">ACTUAL USE</span>
        <svg class="s2-check" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="20" fill="#37bdf8" />
          <path
            d="M14 25 L21 32 L34 17"
            fill="none" stroke="#07121c" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"
          />
        </svg>
      </div>
    </div>

    <!-- Edge flash — a subtle orange rim-light that pulses when the KILLED
         claim lands in audio, sells the "actual use" turn. -->
    <div class="s2-rim" id="s2-rim"></div>
    </div>

    <style>
      [data-composition-id="scene2-not-hype"] {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene2-not-hype"] .s2-whip-wrap {
        position: absolute;
        inset: 0;
        will-change: transform, filter;
      }
      [data-composition-id="scene2-not-hype"] .s2-stack {
        position: absolute;
        top: 120px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        font-family: "Montserrat", sans-serif;
      }
      [data-composition-id="scene2-not-hype"] .s2-chip {
        position: relative;
        padding: 18px 36px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 16px;
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 46px;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }
      [data-composition-id="scene2-not-hype"] .s2-chip-old {
        background: rgba(13, 32, 49, 0.88);
        border: 2px solid rgba(150, 162, 182, 0.55);
        color: rgba(255, 255, 255, 0.55);
        opacity: 0;
        transform: translateY(-14px);
      }
      [data-composition-id="scene2-not-hype"] .s2-x {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 220px;
        height: 80px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      [data-composition-id="scene2-not-hype"] .s2-arrow {
        font-size: 56px;
        line-height: 1;
        color: #96a2b6;
        text-shadow: 0 0 14px rgba(55, 189, 248, 0.45);
        opacity: 0;
      }
      [data-composition-id="scene2-not-hype"] .s2-chip-new {
        background: #07121c;
        border: 3px solid #f09025;
        color: #f09025;
        box-shadow:
          0 0 40px rgba(240, 144, 37, 0.4),
          0 10px 30px rgba(0, 0, 0, 0.55);
        opacity: 0;
        transform: scale(0.55) translateY(18px);
      }
      [data-composition-id="scene2-not-hype"] .s2-chip-label {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
      }
      [data-composition-id="scene2-not-hype"] .s2-check {
        width: 46px;
        height: 46px;
        filter: drop-shadow(0 0 10px rgba(55, 189, 248, 0.7));
      }
      [data-composition-id="scene2-not-hype"] .s2-rim {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse 120% 90% at 50% 50%,
          transparent 60%,
          rgba(240, 144, 37, 0.18) 85%,
          rgba(240, 144, 37, 0.28) 100%
        );
        opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene2-not-hype"] ';
        const DUR = 1.50;

        // ENTRY WHIP — wrapper rises from below with blur de-ramp.
        gsap.set(scope + ".s2-whip-wrap", {
          y: 120, filter: "blur(24px)", opacity: 0.35,
        });
        tl.to(
          scope + ".s2-whip-wrap",
          { y: 0, filter: "blur(0px)", opacity: 1, duration: 0.6, ease: "power3.out" },
          0,
        );

        // NOT HYPE chip fades in immediately — sets up the flip.
        tl.to(
          scope + "#s2-chip-old",
          { opacity: 1, y: 0, duration: 0.28, ease: "power2.out" },
          0.02,
        );

        // "but" @ local 0.12 — X strokes in over NOT HYPE.
        tl.to(
          scope + "#s2-x1",
          { strokeDashoffset: 0, duration: 0.18, ease: "power2.out" },
          0.12,
        );
        tl.to(
          scope + "#s2-x2",
          { strokeDashoffset: 0, duration: 0.18, ease: "power2.out" },
          0.22,
        );

        // Arrow fades in between chips.
        tl.to(
          scope + "#s2-arrow",
          { opacity: 1, duration: 0.2, ease: "power2.out" },
          0.22,
        );

        // "actual" @ local 0.34 — ACTUAL USE chip slams in with scale spring.
        tl.to(
          scope + "#s2-chip-new",
          {
            opacity: 1,
            scale: 1,
            y: 0,
            duration: 0.34,
            ease: "back.out(2.4)",
          },
          0.34,
        );

        // Rim-light flash at local 0.34 peaks with chip arrival.
        tl.to(
          scope + "#s2-rim",
          { opacity: 1, duration: 0.22, ease: "power2.out" },
          0.3,
        );
        tl.to(
          scope + "#s2-rim",
          { opacity: 0.35, duration: 0.5, ease: "power2.inOut" },
          0.55,
        );

        // Arrow bob through remaining duration — keeps frame alive.
        tl.to(
          scope + "#s2-arrow",
          {
            y: 8,
            duration: 0.38,
            yoyo: true,
            repeat: 1,
            ease: "sine.inOut",
          },
          0.68,
        );

        // New chip gets a gentle scale pulse near end.
        tl.to(
          scope + "#s2-chip-new",
          {
            scale: 1.04,
            duration: 0.26,
            yoyo: true,
            repeat: 1,
            ease: "sine.inOut",
          },
          0.95,
        );

        // EXIT WHIP — wrapper slides up with blur.
        tl.to(
          scope + ".s2-whip-wrap",
          { y: -120, filter: "blur(24px)", opacity: 0, duration: 0.3, ease: "power2.in" },
          DUR - 0.3,
        );

        tl.set({}, {}, DUR);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene2-not-hype"] = tl;
      })();
    </script>
  </div>
</template>
