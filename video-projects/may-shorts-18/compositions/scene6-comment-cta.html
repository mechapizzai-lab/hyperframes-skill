<template id="scene6-comment-cta-template">
  <div
    data-composition-id="scene6-comment-cta"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="6.00"
  >
    <!-- Whip wrapper — rises from below on entry (MOTION_PHILOSOPHY §2.4
         "Cut-the-curve vertical whip"). -->
    <div class="s6-whip-wrap">
    <div class="s6-panel">
      <div class="s6-scan" id="s6-scan"></div>

      <div class="s6-row">
        <svg class="s6-bubble" viewBox="0 0 160 140">
          <path
            id="s6-bubble-path"
            d="M 20 20 L 140 20 Q 150 20 150 30 L 150 90 Q 150 100 140 100 L 60 100 L 40 125 L 40 100 L 30 100 Q 20 100 20 90 Z"
            fill="none"
            stroke="#37bdf8"
            stroke-width="8"
            stroke-linejoin="round"
            pathLength="1"
            stroke-dasharray="1"
            stroke-dashoffset="1"
          />
        </svg>
        <div class="s6-label" id="s6-label">COMMENT</div>
      </div>

      <!-- Hero chip — the keyword viewers should comment. Swap word below. -->
      <div class="s6-chip" id="s6-chip">
        <!-- Chip sheen — sweeps across the chip periodically during the
             extended outro hold (MOTION_PHILOSOPHY Law #9 "hold the hero"). -->
        <div class="s6-chip-sheen" id="s6-chip-sheen"></div>
        <span class="s6-chip-text">dead</span>
      </div>

      <div class="s6-arrows" id="s6-arrows">
        <div class="s6-arrow">▾</div>
        <div class="s6-arrow">▾</div>
        <div class="s6-arrow">▾</div>
      </div>

      <div class="s6-sub-wrap">
        <div class="s6-sub-main" id="s6-sub-main">I'LL SEND THE VIDEO</div>
        <div class="s6-sub-why" id="s6-sub-why">EXPLAINING <span class="s6-why-accent">WHY</span></div>
      </div>
    </div>
    </div>

    <style>
      [data-composition-id="scene6-comment-cta"] {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene6-comment-cta"] .s6-whip-wrap {
        position: absolute;
        inset: 0;
        will-change: transform, filter;
      }
      [data-composition-id="scene6-comment-cta"] .s6-panel {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 960px;
        background: #07121c;
        padding: 90px 60px 40px 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        box-sizing: border-box;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
      }
      [data-composition-id="scene6-comment-cta"] .s6-scan {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          #37bdf8 40%,
          #f09025 60%,
          transparent 100%
        );
        opacity: 0.9;
        transform: translateX(-100%);
      }
      [data-composition-id="scene6-comment-cta"] .s6-row {
        display: flex;
        align-items: center;
        gap: 24px;
      }
      [data-composition-id="scene6-comment-cta"] .s6-bubble {
        width: 140px;
        height: 120px;
        filter: drop-shadow(0 0 14px rgba(55, 189, 248, 0.5));
      }
      [data-composition-id="scene6-comment-cta"] .s6-label {
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 60px;
        letter-spacing: 0.1em;
        color: #ffffff;
        opacity: 0;
      }
      [data-composition-id="scene6-comment-cta"] .s6-chip {
        position: relative;
        padding: 20px 56px;
        background: #37bdf8;
        border: 4px solid #ffffff;
        border-radius: 999px;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 130px;
        color: #07121c;
        letter-spacing: -0.02em;
        text-transform: lowercase;
        box-shadow:
          0 0 50px rgba(55, 189, 248, 0.6),
          0 14px 40px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: scale(0.45);
        overflow: hidden;
      }
      [data-composition-id="scene6-comment-cta"] .s6-chip-text {
        position: relative;
        z-index: 2;
      }
      [data-composition-id="scene6-comment-cta"] .s6-chip-sheen {
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        background: linear-gradient(
          105deg,
          transparent 0%,
          rgba(255, 255, 255, 0) 30%,
          rgba(255, 255, 255, 0.75) 50%,
          rgba(255, 255, 255, 0) 70%,
          transparent 100%
        );
        mix-blend-mode: overlay;
        pointer-events: none;
        z-index: 1;
      }
      [data-composition-id="scene6-comment-cta"] .s6-arrows {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        color: #37bdf8;
        opacity: 0;
      }
      [data-composition-id="scene6-comment-cta"] .s6-arrow {
        font-size: 68px;
        line-height: 1;
        text-shadow: 0 0 16px rgba(55, 189, 248, 0.75);
      }
      [data-composition-id="scene6-comment-cta"] .s6-sub-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin-top: auto;
      }
      [data-composition-id="scene6-comment-cta"] .s6-sub-main {
        font-family: "Montserrat", sans-serif;
        font-weight: 300;
        font-size: 40px;
        color: #96a2b6;
        letter-spacing: 0.02em;
        opacity: 0;
        transform: translateY(16px);
      }
      [data-composition-id="scene6-comment-cta"] .s6-sub-why {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 52px;
        color: #ffffff;
        letter-spacing: 0.01em;
        opacity: 0;
        transform: translateY(16px);
      }
      [data-composition-id="scene6-comment-cta"] .s6-why-accent {
        color: #f09025;
        text-shadow: 0 0 16px rgba(240, 144, 37, 0.7);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene6-comment-cta"] ';
        const DUR = 6.00;

        // ENTRY WHIP — wrapper rises from below with blur de-ramp. Matches
        // scene 5's exit whip at the S5→S6 seam. MOTION_PHILOSOPHY §2.4.
        gsap.set(scope + ".s6-whip-wrap", {
          y: 120,
          filter: "blur(24px)",
          opacity: 0.35,
        });
        tl.to(
          scope + ".s6-whip-wrap",
          {
            y: 0,
            filter: "blur(0px)",
            opacity: 1,
            duration: 0.6,
            ease: "power3.out",
          },
          0,
        );

        // Scan bar sweeps across.
        tl.fromTo(
          scope + "#s6-scan",
          { x: "-100%" },
          { x: "100%", duration: 0.6, ease: "power2.inOut" },
          0.0,
        );

        // Bubble stroke-draws in immediately.
        tl.to(
          scope + "#s6-bubble-path",
          { strokeDashoffset: 0, duration: 0.32, ease: "power2.out" },
          0.02,
        );

        // "Comment" @ local 0.00 — label fades in.
        tl.to(
          scope + "#s6-label",
          { opacity: 1, duration: 0.24, ease: "power2.out" },
          0.12,
        );

        // "dead" @ local 0.20 — chip slams in with scale spring.
        tl.to(
          scope + "#s6-chip",
          {
            opacity: 1,
            scale: 1,
            duration: 0.36,
            ease: "back.out(2.6)",
          },
          0.28,
        );
        // Tremor on chip.
        tl.to(
          scope + "#s6-chip",
          {
            rotation: -2,
            duration: 0.05,
            yoyo: true,
            repeat: 3,
            ease: "power1.inOut",
          },
          0.62,
        );
        // Chip gentle scale pulse later — "send" @ 1.22.
        tl.to(
          scope + "#s6-chip",
          {
            scale: 1.05,
            duration: 0.3,
            yoyo: true,
            repeat: 1,
            ease: "sine.inOut",
          },
          1.20,
        );

        // Arrows fade in.
        tl.to(
          scope + "#s6-arrows",
          { opacity: 1, duration: 0.22, ease: "power2.out" },
          0.82,
        );
        // Arrows bob continuously — extended to cover the full 5s after
        // arrows appear (VO stops at ~3.0s; bob carries through the silent
        // outro hold so the frame never feels frozen).
        const bobDur = 0.4;
        const bobCycles = Math.ceil((DUR - 1.0) / bobDur);
        tl.to(
          scope + "#s6-arrows",
          {
            y: 16,
            duration: bobDur,
            ease: "power2.inOut",
            yoyo: true,
            repeat: bobCycles * 2 - 1,
          },
          1.0,
        );

        // "send" @ local 1.22 — subtext main line fades up.
        tl.to(
          scope + "#s6-sub-main",
          { opacity: 1, y: 0, duration: 0.3, ease: "power3.out" },
          1.18,
        );

        // "explaining" @ local 1.90 — why line lands.
        tl.to(
          scope + "#s6-sub-why",
          { opacity: 1, y: 0, duration: 0.32, ease: "power3.out" },
          1.88,
        );

        // "why" @ local 2.44 — orange accent glow pulse on WHY.
        tl.to(
          scope + ".s6-why-accent",
          {
            scale: 1.1,
            duration: 0.28,
            yoyo: true,
            repeat: 1,
            ease: "back.out(2)",
          },
          2.42,
        );
        tl.to(
          scope + ".s6-why-accent",
          {
            textShadow:
              "0 0 32px rgba(240, 144, 37, 1), 0 0 64px rgba(240, 144, 37, 0.7)",
            duration: 0.28,
            yoyo: true,
            repeat: 1,
            ease: "sine.inOut",
          },
          2.44,
        );

        // WHY continues breathing through the extended outro hold — keeps
        // the hero word alive during the 3s of silence after VO ends.
        tl.to(
          scope + ".s6-why-accent",
          {
            textShadow:
              "0 0 28px rgba(240, 144, 37, 0.85), 0 0 56px rgba(240, 144, 37, 0.5)",
            duration: 1.4,
            yoyo: true,
            repeat: 3,
            ease: "sine.inOut",
          },
          3.0,
        );

        // Chip-sheen glint — sweeps across "dead" chip every ~1.4s during the
        // hold. Single highlight that reads as "light catching metal" —
        // MOTION_PHILOSOPHY §2.4 "Shimmer sweep on hold."
        const sheenStarts = [1.8, 3.3, 4.8];
        sheenStarts.forEach(function (t) {
          tl.fromTo(
            scope + "#s6-chip-sheen",
            { left: "-40%" },
            { left: "140%", duration: 0.7, ease: "power2.inOut" },
            t,
          );
        });

        tl.set({}, {}, DUR);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene6-comment-cta"] = tl;
      })();
    </script>
  </div>
</template>
