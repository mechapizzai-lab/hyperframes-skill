<template id="scene5-too-late-template">
  <div
    data-composition-id="scene5-too-late"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="3.50"
  >
    <!-- HIDDEN face mode — full 1080x1920 canvas. Urgency/countdown narrative. -->

    <div class="s5-whip-wrap">
    <!-- Warning chevron stripes — scroll across top -->
    <div class="s5-stripes" id="s5-stripes"></div>
    <div class="s5-stripes-label">
      <span class="s5-stripes-dot"></span>
      <span>WARNING · LAST CALL</span>
    </div>

    <!-- Analog clock — centered mid-upper, hands sweep fast -->
    <div class="s5-clock-wrap">
      <svg class="s5-clock" viewBox="0 0 300 300">
        <!-- Outer ring -->
        <circle cx="150" cy="150" r="138" fill="#0d2031" stroke="#37bdf8" stroke-width="6" />
        <circle cx="150" cy="150" r="138" fill="none" stroke="#f09025" stroke-width="2" opacity="0.35" />
        <!-- Tick marks -->
        <g stroke="#96a2b6" stroke-width="3" stroke-linecap="round">
          <line x1="150" y1="22" x2="150" y2="40" />
          <line x1="278" y1="150" x2="260" y2="150" />
          <line x1="150" y1="278" x2="150" y2="260" />
          <line x1="22" y1="150" x2="40" y2="150" />
        </g>
        <g stroke="rgba(150, 162, 182, 0.5)" stroke-width="2" stroke-linecap="round">
          <line x1="150" y1="30" x2="150" y2="38" transform="rotate(30 150 150)" />
          <line x1="150" y1="30" x2="150" y2="38" transform="rotate(60 150 150)" />
          <line x1="150" y1="30" x2="150" y2="38" transform="rotate(120 150 150)" />
          <line x1="150" y1="30" x2="150" y2="38" transform="rotate(150 150 150)" />
          <line x1="150" y1="30" x2="150" y2="38" transform="rotate(210 150 150)" />
          <line x1="150" y1="30" x2="150" y2="38" transform="rotate(240 150 150)" />
          <line x1="150" y1="30" x2="150" y2="38" transform="rotate(300 150 150)" />
          <line x1="150" y1="30" x2="150" y2="38" transform="rotate(330 150 150)" />
        </g>
        <!-- Minute hand (sweeping fast) -->
        <line
          id="s5-min"
          x1="150" y1="150" x2="150" y2="50"
          stroke="#37bdf8" stroke-width="6" stroke-linecap="round"
          style="transform-origin: 150px 150px;"
        />
        <!-- Hour hand -->
        <line
          id="s5-hour"
          x1="150" y1="150" x2="150" y2="90"
          stroke="#ffffff" stroke-width="8" stroke-linecap="round"
          style="transform-origin: 150px 150px;"
        />
        <circle cx="150" cy="150" r="10" fill="#37bdf8" />
      </svg>
      <div class="s5-clock-glow" id="s5-clock-glow"></div>
    </div>

    <!-- Preamble text that fills the dead zone between clock and SWITCH.
         Appears early on "haven't" and fades out as SWITCH slams in. -->
    <div class="s5-preamble" id="s5-preamble">LAST&nbsp;CHANCE.</div>

    <!-- "SWITCH." — monumental typography, lands on "switch" word -->
    <div class="s5-switch" id="s5-switch">SWITCH.</div>

    <!-- Small grey mono lead-in -->
    <div class="s5-lead" id="s5-lead">BEFORE IT'S</div>

    <!-- Hero payoff: "TOO LATE." in monumental orange — the jaw-dropper -->
    <div class="s5-late-wrap">
      <div class="s5-too" id="s5-too">TOO</div>
      <div class="s5-late" id="s5-late">LATE.</div>
    </div>

    <!-- Impact flash — radial orange pulse that ignites on "LATE" -->
    <div class="s5-flash" id="s5-flash"></div>
    </div>

    <style>
      [data-composition-id="scene5-too-late"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="scene5-too-late"] .s5-whip-wrap {
        position: absolute;
        inset: 0;
        will-change: transform, filter;
      }
      [data-composition-id="scene5-too-late"] .s5-stripes {
        position: absolute;
        top: 0;
        left: -200px;
        right: -200px;
        height: 140px;
        background-image: repeating-linear-gradient(
          -45deg,
          #f09025 0 42px,
          #07121c 42px 84px
        );
        opacity: 0;
      }
      [data-composition-id="scene5-too-late"] .s5-stripes-label {
        position: absolute;
        top: 50px;
        right: 80px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        background: #07121c;
        border: 2px solid #f09025;
        border-radius: 8px;
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 0.14em;
        color: #f09025;
        box-shadow: 0 0 20px rgba(240, 144, 37, 0.4);
        opacity: 0;
      }
      [data-composition-id="scene5-too-late"] .s5-stripes-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f09025;
        box-shadow: 0 0 12px #f09025;
      }
      [data-composition-id="scene5-too-late"] .s5-clock-wrap {
        position: absolute;
        top: 230px;
        left: 50%;
        transform: translateX(-50%);
        width: 340px;
        height: 340px;
        opacity: 0;
      }
      [data-composition-id="scene5-too-late"] .s5-clock {
        position: relative;
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.55));
      }
      [data-composition-id="scene5-too-late"] .s5-clock-glow {
        position: absolute;
        inset: -30px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(240, 144, 37, 0) 50%,
          rgba(240, 144, 37, 0.35) 80%,
          rgba(240, 144, 37, 0) 100%
        );
        opacity: 0;
      }
      [data-composition-id="scene5-too-late"] .s5-preamble {
        position: absolute;
        top: 630px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 86px;
        letter-spacing: 0.08em;
        color: #96a2b6;
        text-shadow: 0 4px 0 #07121c;
        opacity: 0;
        transform: translateY(12px);
      }
      [data-composition-id="scene5-too-late"] .s5-switch {
        position: absolute;
        top: 640px;
        left: 50%;
        transform: translate(-50%, 30px) scale(0.7);
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 240px;
        line-height: 0.9;
        letter-spacing: -0.03em;
        color: #37bdf8;
        text-shadow:
          0 0 60px rgba(55, 189, 248, 0.55),
          0 6px 0 #07121c,
          0 14px 40px rgba(0, 0, 0, 0.6);
        opacity: 0;
        white-space: nowrap;
      }
      [data-composition-id="scene5-too-late"] .s5-lead {
        position: absolute;
        top: 890px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 54px;
        letter-spacing: 0.18em;
        color: #96a2b6;
        opacity: 0;
        transform: translateY(14px);
      }
      [data-composition-id="scene5-too-late"] .s5-late-wrap {
        position: absolute;
        top: 990px;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      [data-composition-id="scene5-too-late"] .s5-too {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 160px;
        line-height: 0.88;
        letter-spacing: -0.02em;
        color: #ffffff;
        text-shadow: 0 4px 0 #07121c, 0 10px 30px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transform: translateY(20px);
      }
      [data-composition-id="scene5-too-late"] .s5-late {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 340px;
        line-height: 0.85;
        letter-spacing: -0.04em;
        color: #f09025;
        text-shadow:
          0 0 80px rgba(240, 144, 37, 0.8),
          0 8px 0 #07121c,
          0 20px 50px rgba(0, 0, 0, 0.7);
        opacity: 0;
        transform: scale(0.35) rotate(-5deg);
      }
      [data-composition-id="scene5-too-late"] .s5-flash {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 70%,
          rgba(240, 144, 37, 0.45) 0%,
          rgba(240, 144, 37, 0.15) 40%,
          transparent 70%
        );
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene5-too-late"] ';
        const DUR = 3.50;

        // ENTRY WHIP — wrapper rises from below with blur de-ramp.
        gsap.set(scope + ".s5-whip-wrap", {
          y: 120, filter: "blur(24px)", opacity: 0.35,
        });
        tl.to(
          scope + ".s5-whip-wrap",
          { y: 0, filter: "blur(0px)", opacity: 1, duration: 0.6, ease: "power3.out" },
          0,
        );

        // Warning stripes fade in immediately — urgency frame.
        tl.to(
          scope + ".s5-stripes",
          { opacity: 0.45, duration: 0.3, ease: "power2.out" },
          0.02,
        );
        // Scroll the stripes pattern horizontally.
        tl.to(
          scope + ".s5-stripes",
          {
            backgroundPosition: "-420px 0",
            duration: 3.2,
            ease: "none",
          },
          0.3,
        );
        tl.to(
          scope + ".s5-stripes-label",
          { opacity: 1, duration: 0.26, ease: "power2.out" },
          0.22,
        );

        // Clock fades in, hands start sweeping fast.
        tl.to(
          scope + ".s5-clock-wrap",
          { opacity: 1, duration: 0.32, ease: "power2.out" },
          0.14,
        );
        // Minute hand sweeps 360° over 2.2s (accelerating sense of time running out)
        tl.to(
          scope + "#s5-min",
          {
            rotation: 720,
            duration: 2.0,
            ease: "power2.in",
            transformOrigin: "150px 150px",
          },
          0.45,
        );
        // Hour hand sweeps slower
        tl.to(
          scope + "#s5-hour",
          {
            rotation: 180,
            duration: 2.0,
            ease: "power1.in",
            transformOrigin: "150px 150px",
          },
          0.45,
        );
        // Clock glow pulses as "too late" approaches
        tl.to(
          scope + "#s5-clock-glow",
          {
            opacity: 0.8,
            duration: 0.45,
            yoyo: true,
            repeat: 1,
            ease: "sine.inOut",
          },
          1.9,
        );

        // LAST CHANCE. preamble — fills middle dead zone before SWITCH lands.
        // Appears just after the clock is settled, holds until SWITCH fires.
        tl.to(
          scope + "#s5-preamble",
          { opacity: 1, y: 0, duration: 0.32, ease: "power2.out" },
          0.45,
        );
        // Preamble pulses slightly to stay alive during hold.
        tl.to(
          scope + "#s5-preamble",
          {
            letterSpacing: "0.14em",
            duration: 0.5,
            yoyo: true,
            repeat: 1,
            ease: "sine.inOut",
          },
          0.85,
        );
        // Fade out just before SWITCH slams in.
        tl.to(
          scope + "#s5-preamble",
          { opacity: 0, scale: 0.94, duration: 0.22, ease: "power2.in" },
          1.48,
        );

        // "switch" @ local 1.68 — SWITCH. slams in.
        tl.to(
          scope + "#s5-switch",
          {
            opacity: 1,
            y: 0,
            scale: 1,
            duration: 0.38,
            ease: "back.out(2.2)",
          },
          1.66,
        );
        // Tremor
        tl.to(
          scope + "#s5-switch",
          {
            x: 6,
            duration: 0.05,
            yoyo: true,
            repeat: 3,
            ease: "power1.inOut",
          },
          2.04,
        );

        // "before it's" @ local 1.90 — lead fades in.
        tl.to(
          scope + "#s5-lead",
          { opacity: 1, y: 0, duration: 0.28, ease: "power2.out" },
          1.88,
        );

        // "too" @ local 2.48 — TOO fades up.
        tl.to(
          scope + "#s5-too",
          { opacity: 1, y: 0, duration: 0.26, ease: "power3.out" },
          2.44,
        );

        // "late" @ local 2.62 — MONUMENTAL LATE. SLAM.
        tl.to(
          scope + "#s5-late",
          {
            opacity: 1,
            scale: 1,
            rotation: -2,
            duration: 0.42,
            ease: "back.out(2.8)",
          },
          2.60,
        );
        // LATE tremor
        tl.to(
          scope + "#s5-late",
          {
            rotation: 0,
            duration: 0.06,
            yoyo: true,
            repeat: 4,
            ease: "power1.inOut",
          },
          3.02,
        );
        // Impact flash — bursts bright then dims.
        tl.to(
          scope + "#s5-flash",
          { opacity: 1, duration: 0.12, ease: "power2.out" },
          2.60,
        );
        tl.to(
          scope + "#s5-flash",
          { opacity: 0.3, duration: 0.6, ease: "power2.inOut" },
          2.72,
        );

        // EXIT WHIP — wrapper slides up with blur. Matches scene 6's entry.
        tl.to(
          scope + ".s5-whip-wrap",
          { y: -120, filter: "blur(24px)", opacity: 0, duration: 0.3, ease: "power2.in" },
          DUR - 0.3,
        );

        tl.set({}, {}, DUR);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene5-too-late"] = tl;
      })();
    </script>
  </div>
</template>
