<template id="grain-overlay-template">
  <div
    data-composition-id="grain-overlay"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="19.82"
  >
    <!-- Unifying film-grain texture — pure CSS, deterministic, headless-safe.
         Recipe from MOTION_PHILOSOPHY.md §2.1 item 11: three radial-gradients
         at tile sizes 3/5/7px, each a 1px dot at a different position, alphas
         .03 / .02 / .015. Non-repeating look without a PNG. -->
    <div class="grain" id="grain"></div>

    <style>
      [data-composition-id="grain-overlay"] {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      [data-composition-id="grain-overlay"] .grain {
        position: absolute;
        inset: 0;
        mix-blend-mode: overlay;
        background-image:
          radial-gradient(circle at 37% 61%, rgba(255,255,255,0.030) 0.6px, transparent 1px),
          radial-gradient(circle at 72% 23%, rgba(255,255,255,0.020) 0.6px, transparent 1px),
          radial-gradient(circle at 12% 88%, rgba(255,255,255,0.015) 0.6px, transparent 1px);
        background-size: 3px 3px, 5px 5px, 7px 7px;
        will-change: auto;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        // Grain is static; anchor the timeline to the full slot.
        tl.set({}, {}, 19.82);
        window.__timelines = window.__timelines || {};
        window.__timelines["grain-overlay"] = tl;
      })();
    </script>
  </div>
</template>
