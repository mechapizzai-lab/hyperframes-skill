<template id="v09-flowchart-template">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <div
    data-composition-id="v09-flowchart"
    data-start="0"
    data-duration="6"
    data-width="1920"
    data-height="1080"
  >
    <div class="v09-root">
      <div class="v09-grid"></div>

      <div class="v09-kicker" id="v09-kicker">DETERMINISTIC RENDERING</div>

      <svg class="v09-svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
        <!-- Connecting arrows (drawn first, animated via strokeDashoffset) -->
        <g class="v09-arrows" fill="none" stroke="#37bdf8" stroke-width="3">
          <path id="v09-arrow1" d="M 440 470 L 640 470" stroke-dasharray="200" stroke-dashoffset="200" />
          <path id="v09-arrow2" d="M 900 470 L 1100 470" stroke-dasharray="200" stroke-dashoffset="200" />
          <path id="v09-arrow3" d="M 1360 470 L 1560 470" stroke-dasharray="200" stroke-dashoffset="200" />
          <!-- arrow tips -->
          <polygon id="v09-tip1" points="640,470 628,462 628,478" fill="#37bdf8" opacity="0"/>
          <polygon id="v09-tip2" points="1100,470 1088,462 1088,478" fill="#37bdf8" opacity="0"/>
          <polygon id="v09-tip3" points="1560,470 1548,462 1548,478" fill="#37bdf8" opacity="0"/>
        </g>
      </svg>

      <!-- Nodes -->
      <div class="v09-node v09-n1" id="v09-n1">
        <div class="v09-node-icon">&lt;/&gt;</div>
        <div class="v09-node-label">HTML</div>
        <div class="v09-node-sub">index.html + GSAP</div>
      </div>

      <div class="v09-node v09-n2" id="v09-n2">
        <div class="v09-node-icon">◉</div>
        <div class="v09-node-label">BROWSER</div>
        <div class="v09-node-sub">Chrome · beginFrame</div>
      </div>

      <div class="v09-node v09-n3" id="v09-n3">
        <div class="v09-node-icon">▸▸▸</div>
        <div class="v09-node-label">FFMPEG</div>
        <div class="v09-node-sub">H.264 · libx264</div>
      </div>

      <div class="v09-node v09-n4" id="v09-n4">
        <div class="v09-node-icon">▶</div>
        <div class="v09-node-label">MP4</div>
        <div class="v09-node-sub">1920×1080 · 30fps</div>
      </div>

      <div class="v09-stamp" id="v09-stamp">
        <div class="v09-stamp-line1">SAME INPUT.</div>
        <div class="v09-stamp-line2">IDENTICAL OUTPUT.</div>
        <div class="v09-stamp-line3">EVERY TIME.</div>
      </div>
    </div>

    <style>
      [data-composition-id="v09-flowchart"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="v09-flowchart"] .v09-root {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 80% 70% at 50% 50%, #0f2033 0%, #07121c 70%, #030812 100%);
      }
      [data-composition-id="v09-flowchart"] .v09-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(55,189,248,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(55,189,248,0.05) 1px, transparent 1px);
        background-size: 60px 60px;
      }
      [data-composition-id="v09-flowchart"] .v09-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      [data-composition-id="v09-flowchart"] .v09-kicker {
        position: absolute;
        top: 120px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 0.42em;
        color: #37bdf8;
        opacity: 0;
      }
      [data-composition-id="v09-flowchart"] .v09-node {
        position: absolute;
        width: 240px;
        height: 240px;
        top: 350px;
        border: 2px solid rgba(55,189,248,0.4);
        background: rgba(13,32,49,0.85);
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 20px;
        box-sizing: border-box;
        opacity: 0;
        transform: scale(0.85);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      }
      [data-composition-id="v09-flowchart"] .v09-n1 { left: 200px; }
      [data-composition-id="v09-flowchart"] .v09-n2 { left: 660px; }
      [data-composition-id="v09-flowchart"] .v09-n3 { left: 1120px; }
      [data-composition-id="v09-flowchart"] .v09-n4 { left: 1580px; }
      [data-composition-id="v09-flowchart"] .v09-node-icon {
        font-family: "Roboto Mono", monospace;
        font-size: 60px;
        color: #37bdf8;
        text-shadow: 0 0 20px rgba(55,189,248,0.6);
      }
      [data-composition-id="v09-flowchart"] .v09-node-label {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 36px;
        color: #f5f7fa;
        letter-spacing: -0.01em;
      }
      [data-composition-id="v09-flowchart"] .v09-node-sub {
        font-family: "Roboto Mono", monospace;
        font-size: 15px;
        letter-spacing: 0.14em;
        color: #96a2b6;
        text-align: center;
      }
      [data-composition-id="v09-flowchart"] .v09-n4 {
        border-color: #f09025;
        background: rgba(77, 45, 20, 0.6);
      }
      [data-composition-id="v09-flowchart"] .v09-n4 .v09-node-icon,
      [data-composition-id="v09-flowchart"] .v09-n4 .v09-node-label {
        color: #f09025;
        text-shadow: 0 0 20px rgba(240,144,37,0.6);
      }
      [data-composition-id="v09-flowchart"] .v09-stamp {
        position: absolute;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        opacity: 0;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 52px;
        line-height: 1.1;
        letter-spacing: -0.005em;
      }
      [data-composition-id="v09-flowchart"] .v09-stamp-line1 { color: #f5f7fa; }
      [data-composition-id="v09-flowchart"] .v09-stamp-line2 { color: #37bdf8; text-shadow: 0 0 30px rgba(55,189,248,0.5); }
      [data-composition-id="v09-flowchart"] .v09-stamp-line3 { color: #f09025; text-shadow: 0 0 30px rgba(240,144,37,0.5); }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="v09-flowchart"]';

        // Kicker 0
        tl.to(`${root} .v09-kicker`, { opacity: 1, duration: 0.4 }, 0.1);

        // Nodes cascade in 0.3 - 2.5, arrows between them
        const nodes = [".v09-n1", ".v09-n2", ".v09-n3", ".v09-n4"];
        const arrows = ["#v09-arrow1", "#v09-arrow2", "#v09-arrow3"];
        const tips = ["#v09-tip1", "#v09-tip2", "#v09-tip3"];

        nodes.forEach((sel, i) => {
          const t = 0.3 + i * 0.55;
          tl.fromTo(`${root} ${sel}`, { opacity: 0, scale: 0.7, y: 30 }, { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "back.out(1.3)" }, t);
          // Pulse node icon
          tl.to(`${root} ${sel} .v09-node-icon`, { scale: 1.2, duration: 0.2, yoyo: true, repeat: 1, ease: "power2.inOut" }, t + 0.2);

          if (i < 3) {
            // Arrow draws from this node to next
            tl.to(`${root} ${arrows[i]}`, { strokeDashoffset: 0, duration: 0.4, ease: "power2.inOut" }, t + 0.35);
            tl.to(`${root} ${tips[i]}`, { opacity: 1, duration: 0.1 }, t + 0.7);
          }
        });

        // Final node emphasis pulse at ~3.3s
        tl.to(`${root} .v09-n4`, { scale: 1.08, duration: 0.3, ease: "power2.out" }, 3.3);
        tl.to(`${root} .v09-n4`, { scale: 1.0, duration: 0.4, ease: "power2.out" }, 3.6);

        // Stamp reveal 3.7 - 4.5
        tl.fromTo(`${root} .v09-stamp`, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 3.7);
        tl.fromTo(`${root} .v09-stamp-line1`, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" }, 3.75);
        tl.fromTo(`${root} .v09-stamp-line2`, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" }, 4.0);
        tl.fromTo(`${root} .v09-stamp-line3`, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" }, 4.25);

        // Subtle final emphasis
        tl.to(`${root} .v09-stamp-line3`, { scale: 1.08, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.inOut" }, 4.8);

        window.__timelines["v09-flowchart"] = tl;
      })();
    </script>
  </div>
</template>
