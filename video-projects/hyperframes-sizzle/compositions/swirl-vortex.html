<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Lato:wght@400;700&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="swirl-vortex"
      data-start="0"
      data-duration="3.5"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="swirl-vortex"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: #0a1628;
        }

        /* Blueprint grid */
        .bp-grid {
          position: absolute;
          inset: 0;
          background-image:
            linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
          background-size: 40px 40px;
          pointer-events: none;
        }

        /* Layout */
        .bp-left {
          position: absolute;
          left: 0;
          top: 0;
          bottom: 0;
          width: 1200px;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .bp-right {
          position: absolute;
          right: 0;
          top: 0;
          bottom: 0;
          width: 720px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 60px 60px 60px 40px;
        }
        .bp-divider {
          position: absolute;
          left: 1200px;
          top: 60px;
          bottom: 60px;
          width: 1px;
          background: #37bdf8;
          opacity: 0.2;
        }
        .bp-number {
          font-family: "Space Mono", monospace;
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 0.4em;
          text-transform: uppercase;
          position: absolute;
          top: 40px;
          left: 60px;
          color: #37bdf8;
        }

        /* Right panel typography */
        .bp-name {
          font-family: "Bebas Neue", sans-serif;
          font-size: 42px;
          letter-spacing: 0.08em;
          margin-bottom: 20px;
          color: #37bdf8;
          text-shadow: 0 0 24px rgba(55, 189, 248, 0.45);
        }
        .bp-plabel {
          font-family: "Space Mono", monospace;
          font-size: 12px;
          font-weight: 700;
          letter-spacing: 0.32em;
          text-transform: uppercase;
          margin-bottom: 10px;
          color: #37bdf8;
          opacity: 0.8;
        }
        .bp-prompt {
          font-family: "JetBrains Mono", monospace;
          font-size: 20px;
          line-height: 1.6;
          padding: 18px 22px;
          border-radius: 8px;
          margin-bottom: 22px;
          color: #37bdf8;
          background: rgba(55, 189, 248, 0.08);
          border: 1px solid rgba(55, 189, 248, 0.22);
          box-shadow: 0 0 28px rgba(55, 189, 248, 0.12) inset;
        }
        .bp-desc {
          font-family: "Lato", sans-serif;
          font-size: 18px;
          line-height: 1.6;
          color: #c7d7e8;
          opacity: 0.85;
        }

        /* GL scenes (hidden, just for texture capture) */
        .scene {
          position: absolute;
          top: 0;
          left: 0;
          width: 1200px;
          height: 1080px;
          overflow: hidden;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .scene-label {
          font-family: "Bebas Neue", sans-serif;
          font-size: 160px;
          letter-spacing: 0.06em;
          opacity: 0.35;
        }
      </style>

      <div class="bp-grid"></div>
      <div class="bp-divider"></div>
      <div class="bp-number">07 / 14</div>

      <!-- GL demo scenes (captured as textures, then hidden) -->
      <div id="s1" class="scene" style="background: #0a1628">
        <div class="scene-label" style="color: #37bdf8">SCENE A</div>
      </div>
      <div id="s2" class="scene" style="background: #37bdf8; opacity: 0">
        <div class="scene-label" style="color: #0a1628">SCENE B</div>
      </div>

      <!-- GL canvas (left panel only) -->
      <canvas
        id="gl-canvas"
        width="1200"
        height="1080"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 1200px;
          height: 1080px;
          z-index: 10;
          pointer-events: none;
          display: none;
        "
      >
      </canvas>

      <!-- Right panel metadata -->
      <div class="bp-right">
        <div class="bp-name">Swirl Vortex</div>
        <div class="bp-plabel">Prompt</div>
        <div class="bp-prompt">npx hyperframes add swirl-vortex</div>
        <div class="bp-desc">
          Both scenes swirl in opposite directions through an FBM-warped spiral. Organic, kinetic
          shader transition — one line to install, one line to use.
        </div>
      </div>

      <div
        id="driver"
        data-start="0"
        data-duration="3.5"
        data-track-index="0"
        style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var glCanvas = document.getElementById("gl-canvas");
      var gl = glCanvas.getContext("webgl", { preserveDrawingBuffer: true });
      if (!gl) {
        console.warn("WebGL not available");
        window.__timelines["swirl-vortex"] = gsap.timeline({ paused: true });
      } else {
        gl.viewport(0, 0, 1200, 1080);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
        var sceneTextures = {};

        function captureScene(sceneId) {
          var scene = document.getElementById(sceneId);
          var origOpacity = scene.style.opacity;
          var origZ = scene.style.zIndex;
          scene.style.opacity = "1";
          scene.style.zIndex = "999";
          scene.offsetHeight;
          var c = document.createElement("canvas");
          c.width = 1200;
          c.height = 1080;
          var ctx = c.getContext("2d");
          ctx.fillStyle = window.getComputedStyle(scene).backgroundColor;
          ctx.fillRect(0, 0, 1200, 1080);
          var sr = scene.getBoundingClientRect();
          var els = scene.querySelectorAll("*");
          for (var i = 0; i < els.length; i++) {
            var el = els[i],
              cs = window.getComputedStyle(el);
            if (cs.display === "none" || cs.visibility === "hidden") continue;
            var r = el.getBoundingClientRect();
            if (r.width < 1 || r.height < 1) continue;
            var x = r.left - sr.left,
              y = r.top - sr.top,
              w = r.width,
              h = r.height;
            ctx.save();
            ctx.globalAlpha = parseFloat(cs.opacity) || 1;
            var bg = cs.backgroundColor;
            if (bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent") {
              ctx.fillStyle = bg;
              ctx.fillRect(x, y, w, h);
            }
            var hasChildEls = el.querySelector("div,span,img,video");
            var text = "";
            for (var j = 0; j < el.childNodes.length; j++)
              if (el.childNodes[j].nodeType === 3) text += el.childNodes[j].textContent;
            text = text.trim();
            if (text && !hasChildEls) {
              ctx.font = cs.fontWeight + " " + cs.fontSize + " " + cs.fontFamily;
              ctx.fillStyle = cs.color;
              if (cs.letterSpacing && cs.letterSpacing !== "normal")
                ctx.letterSpacing = cs.letterSpacing;
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(text, x + w / 2, y + h / 2);
            }
            ctx.restore();
          }
          scene.style.opacity = origOpacity;
          scene.style.zIndex = origZ;
          var tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, c);
          sceneTextures[sceneId] = tex;
        }

        var vertSrc =
          "attribute vec2 a_pos; varying vec2 v_uv; void main(){" +
          "v_uv=a_pos*0.5+0.5; v_uv.y=1.0-v_uv.y; gl_Position=vec4(a_pos,0,1);}";
        var quadBuf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
        gl.bufferData(
          gl.ARRAY_BUFFER,
          new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
          gl.STATIC_DRAW,
        );
        function compileShader(src, type) {
          var s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
            console.error("Shader:", gl.getShaderInfoLog(s));
          return s;
        }
        function mkProg(fragSrc) {
          var p = gl.createProgram();
          gl.attachShader(p, compileShader(vertSrc, gl.VERTEX_SHADER));
          gl.attachShader(p, compileShader(fragSrc, gl.FRAGMENT_SHADER));
          gl.linkProgram(p);
          if (!gl.getProgramParameter(p, gl.LINK_STATUS))
            console.error("Link:", gl.getProgramInfoLog(p));
          return p;
        }

        var H =
          "precision mediump float;" +
          "varying vec2 v_uv;" +
          "uniform sampler2D u_from, u_to;" +
          "uniform float u_progress;" +
          "uniform vec2 u_resolution;\n";

        var NQ =
          "float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}" +
          "float vnoise(vec2 p){vec2 i=floor(p),f=fract(p);" +
          "f=f*f*f*(f*(f*6.-15.)+10.);" +
          "return mix(mix(hash(i),hash(i+vec2(1,0)),f.x)," +
          "mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}" +
          "float fbm(vec2 p){float v=0.,a=.5;" +
          "mat2 R=mat2(.8,.6,-.6,.8);" +
          "for(int i=0;i<5;i++){v+=a*vnoise(p);p=R*p*2.02;a*=.5;}return v;}";

        var progPass = mkProg(H + "void main(){gl_FragColor=texture2D(u_from,v_uv);}");
        var progTrans = mkProg(
          H +
            NQ +
            "void main(){vec2 uv=v_uv-.5;float dist=length(uv);float warp=fbm(v_uv*4.)*.5;float fromAng=u_progress*(1.-dist)*10.+warp*u_progress*3.;float fs=sin(fromAng),fc=cos(fromAng);vec2 fromUv=clamp(vec2(uv.x*fc-uv.y*fs,uv.x*fs+uv.y*fc)+.5,0.,1.);float toAng=-(1.-u_progress)*(1.-dist)*10.-warp*(1.-u_progress)*3.;float ts=sin(toAng),tc=cos(toAng);vec2 toUv=clamp(vec2(uv.x*tc-uv.y*ts,uv.x*ts+uv.y*tc)+.5,0.,1.);vec4 A=texture2D(u_from,fromUv);vec4 B=texture2D(u_to,toUv);gl_FragColor=mix(A,B,u_progress);}",
        );

        function renderShader(prog, texFrom, texTo, progress) {
          gl.useProgram(prog);
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, texFrom);
          gl.uniform1i(gl.getUniformLocation(prog, "u_from"), 0);
          gl.activeTexture(gl.TEXTURE1);
          gl.bindTexture(gl.TEXTURE_2D, texTo);
          gl.uniform1i(gl.getUniformLocation(prog, "u_to"), 1);
          gl.uniform1f(gl.getUniformLocation(prog, "u_progress"), progress);
          gl.uniform2f(gl.getUniformLocation(prog, "u_resolution"), 1200, 1080);
          var pos = gl.getAttribLocation(prog, "a_pos");
          gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
          gl.enableVertexAttribArray(pos);
          gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        function easeInOut(p) {
          return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
        }

        var capturesReady = false;
        function doCaptures() {
          captureScene("s1");
          captureScene("s2");
          glCanvas.style.display = "block";
          renderShader(progPass, sceneTextures["s1"], sceneTextures["s1"], 0);
          document.querySelectorAll(".scene").forEach(function (s) {
            s.style.opacity = "0";
          });
          capturesReady = true;
        }
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(doCaptures);
        } else {
          doCaptures();
        }

        // Shader transition window: 25% → 75% of the 3.5s slot (0.875 → 2.625)
        var TRANS_IN = 0.875;
        var TRANS_OUT = 2.625;
        var tl = gsap.timeline({
          paused: true,
          onUpdate: function () {
            if (!capturesReady) return;
            var t = tl.time();
            if (t >= TRANS_IN && t < TRANS_OUT) {
              renderShader(
                progTrans,
                sceneTextures["s1"],
                sceneTextures["s2"],
                easeInOut((t - TRANS_IN) / (TRANS_OUT - TRANS_IN)),
              );
            } else if (t >= TRANS_OUT) {
              renderShader(progPass, sceneTextures["s2"], sceneTextures["s2"], 0);
            } else {
              renderShader(progPass, sceneTextures["s1"], sceneTextures["s1"], 0);
            }
          },
        });
        tl.to({ v: 0 }, { v: 1, duration: 3.5, ease: "none" }, 0);
        window.__timelines["swirl-vortex"] = tl;
      } // end if (gl)
    </script>
  </body>
</html>
