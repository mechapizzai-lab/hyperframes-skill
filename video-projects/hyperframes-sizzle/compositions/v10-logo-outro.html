<template id="v10-logo-outro-template">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <div
    data-composition-id="v10-logo-outro"
    data-start="0"
    data-duration="6"
    data-width="1920"
    data-height="1080"
  >
    <div class="v10-root">
      <div class="v10-bg-glow"></div>
      <div class="v10-grid"></div>

      <!-- Rays from center -->
      <div class="v10-rays" id="v10-rays">
        <div class="v10-ray" style="--deg: 0deg"></div>
        <div class="v10-ray" style="--deg: 30deg"></div>
        <div class="v10-ray" style="--deg: 60deg"></div>
        <div class="v10-ray" style="--deg: 90deg"></div>
        <div class="v10-ray" style="--deg: 120deg"></div>
        <div class="v10-ray" style="--deg: 150deg"></div>
      </div>

      <div class="v10-lockup">
        <img class="v10-ais" src="assets/ais-logo.png" alt="AIS" />
        <div class="v10-plus">×</div>
        <div class="v10-hyper-wordmark">
          <span class="v10-hyper-hyper">HYPER</span><span class="v10-hyper-frames">FRAMES</span>
        </div>
      </div>

      <div class="v10-tagline" id="v10-tagline">
        Made with <span class="v10-accent">Claude Code</span>
        +
        <span class="v10-hot">Hyperframes</span>
      </div>

      <div class="v10-url" id="v10-url">hyperframes.heygen.com</div>

      <div class="v10-corner-stamps">
        <div class="v10-stamp" id="v10-stamp1">75.00s</div>
        <div class="v10-stamp" id="v10-stamp2">2,250 frames</div>
        <div class="v10-stamp" id="v10-stamp3">1 prompt</div>
      </div>
    </div>

    <style>
      [data-composition-id="v10-logo-outro"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="v10-logo-outro"] .v10-root {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 80% 70% at 50% 50%, #0d1a2b 0%, #07121c 65%, #030812 100%);
      }
      [data-composition-id="v10-logo-outro"] .v10-bg-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1400px;
        height: 1400px;
        transform: translate(-50%, -50%) scale(0.5);
        background: radial-gradient(circle, rgba(55,189,248,0.35) 0%, rgba(240,144,37,0.08) 40%, transparent 70%);
        opacity: 0;
        filter: blur(20px);
      }
      [data-composition-id="v10-logo-outro"] .v10-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(55,189,248,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(55,189,248,0.04) 1px, transparent 1px);
        background-size: 100px 100px;
      }
      [data-composition-id="v10-logo-outro"] .v10-rays {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 2px;
        height: 2px;
        opacity: 0;
      }
      [data-composition-id="v10-logo-outro"] .v10-ray {
        position: absolute;
        top: 0;
        left: 0;
        width: 1800px;
        height: 1px;
        background: linear-gradient(90deg, rgba(55,189,248,0.35) 0%, transparent 100%);
        transform-origin: 0 0;
        transform: rotate(var(--deg)) translateX(-900px);
      }
      [data-composition-id="v10-logo-outro"] .v10-lockup {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        gap: 60px;
        opacity: 0;
      }
      [data-composition-id="v10-logo-outro"] .v10-ais {
        width: 180px;
        height: auto;
        opacity: 0;
        filter: drop-shadow(0 0 30px rgba(55,189,248,0.5));
      }
      [data-composition-id="v10-logo-outro"] .v10-plus {
        font-family: "Montserrat", sans-serif;
        font-weight: 300;
        font-size: 92px;
        color: #37bdf8;
        text-shadow: 0 0 30px rgba(55,189,248,0.6);
        opacity: 0;
      }
      [data-composition-id="v10-logo-outro"] .v10-hyper-wordmark {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 120px;
        letter-spacing: -0.03em;
        line-height: 1;
        opacity: 0;
      }
      [data-composition-id="v10-logo-outro"] .v10-hyper-hyper {
        color: #f5f7fa;
        text-shadow: 0 0 30px rgba(255,255,255,0.3);
      }
      [data-composition-id="v10-logo-outro"] .v10-hyper-frames {
        color: #f09025;
        text-shadow: 0 0 40px rgba(240,144,37,0.6);
      }
      [data-composition-id="v10-logo-outro"] .v10-tagline {
        position: absolute;
        top: 67%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 46px;
        letter-spacing: 0.02em;
        color: #f5f7fa;
        opacity: 0;
      }
      [data-composition-id="v10-logo-outro"] .v10-accent { color: #37bdf8; }
      [data-composition-id="v10-logo-outro"] .v10-hot { color: #f09025; }
      [data-composition-id="v10-logo-outro"] .v10-url {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 28px;
        letter-spacing: 0.22em;
        color: #96a2b6;
        opacity: 0;
        padding: 10px 24px;
        border: 1px solid rgba(55,189,248,0.25);
        border-radius: 8px;
      }
      [data-composition-id="v10-logo-outro"] .v10-corner-stamps {
        position: absolute;
        top: 80px;
        left: 80px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      [data-composition-id="v10-logo-outro"] .v10-stamp {
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.28em;
        color: #37bdf8;
        padding: 8px 16px;
        border-left: 3px solid #37bdf8;
        opacity: 0;
      }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="v10-logo-outro"]';

        // BG glow builds up 0 - 1.5
        tl.to(`${root} .v10-bg-glow`, { opacity: 1, scale: 1, duration: 1.2, ease: "power3.out" }, 0);

        // Rays burst + rotate
        tl.to(`${root} .v10-rays`, { opacity: 1, duration: 0.3 }, 0.3);
        tl.to(`${root} .v10-rays`, { rotate: 30, duration: 5.5, ease: "none" }, 0.3);

        // Lockup reveal 0.5 - 1.6
        tl.to(`${root} .v10-lockup`, { opacity: 1, duration: 0.3 }, 0.5);
        tl.fromTo(`${root} .v10-ais`, { opacity: 0, scale: 0.6, rotate: -20 }, { opacity: 1, scale: 1, rotate: 0, duration: 0.7, ease: "back.out(1.4)" }, 0.5);
        tl.fromTo(`${root} .v10-plus`, { opacity: 0, rotate: -180, scale: 0 }, { opacity: 1, rotate: 0, scale: 1, duration: 0.5, ease: "back.out(2)" }, 0.9);
        tl.fromTo(`${root} .v10-hyper-wordmark`, { opacity: 0, x: 60 }, { opacity: 1, x: 0, duration: 0.6, ease: "power3.out" }, 1.1);

        // Tagline 1.8
        tl.fromTo(`${root} .v10-tagline`, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 1.8);

        // URL 2.3
        tl.fromTo(`${root} .v10-url`, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" }, 2.3);

        // Corner stamps cascade 2.6
        tl.to(`${root} #v10-stamp1`, { opacity: 1, duration: 0.3 }, 2.6);
        tl.to(`${root} #v10-stamp2`, { opacity: 1, duration: 0.3 }, 2.85);
        tl.to(`${root} #v10-stamp3`, { opacity: 1, duration: 0.3 }, 3.1);

        // Subtle breath pulse on lockup (3.5 - 5.5)
        tl.to(`${root} .v10-lockup`, { scale: 1.015, duration: 1.0, yoyo: true, repeat: 1, ease: "sine.inOut" }, 3.5);

        // Final glow ramp 4.5
        tl.to(`${root} .v10-bg-glow`, { scale: 1.15, opacity: 1.3, duration: 1.5, ease: "power2.inOut" }, 4.5);

        // Hold final frame through end
        tl.set({}, {}, 6);

        window.__timelines["v10-logo-outro"] = tl;
      })();
    </script>
  </div>
</template>
