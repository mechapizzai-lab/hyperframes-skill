<template id="v01-kinetic-type-template">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <div
    data-composition-id="v01-kinetic-type"
    data-start="0"
    data-duration="7"
    data-width="1920"
    data-height="1080"
  >
    <div class="v01-root">
      <div class="v01-grid"></div>

      <div class="v01-stanza" id="v01-s1">
        <span class="v01-w">WRITE</span>
        <span class="v01-w v01-accent">HTML.</span>
      </div>

      <div class="v01-stanza" id="v01-s2">
        <span class="v01-w">RENDER</span>
        <span class="v01-w v01-hot">VIDEO.</span>
      </div>

      <div class="v01-stanza" id="v01-s3">
        <span class="v01-w shimmer-sweep-target"><span class="v01-accent">BUILT</span></span>
        <span class="v01-w">FOR</span>
        <span class="v01-w v01-hot">AGENTS.</span>
      </div>
    </div>

    <style>
      [data-composition-id="v01-kinetic-type"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="v01-kinetic-type"] .v01-root {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 70% 60% at 50% 50%, #0d1a2b 0%, #07121c 65%, #030812 100%);
      }
      [data-composition-id="v01-kinetic-type"] .v01-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(55,189,248,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(55,189,248,0.04) 1px, transparent 1px);
        background-size: 120px 120px;
      }
      [data-composition-id="v01-kinetic-type"] .v01-stanza {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        gap: 28px;
        align-items: baseline;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        letter-spacing: -0.025em;
        line-height: 1;
        font-size: 240px;
        color: #f5f7fa;
        opacity: 0;
        white-space: nowrap;
      }
      [data-composition-id="v01-kinetic-type"] .v01-w {
        display: inline-block;
        opacity: 0;
        transform: translateY(40px);
      }
      [data-composition-id="v01-kinetic-type"] #v01-s2 {
        font-size: 200px;
      }
      [data-composition-id="v01-kinetic-type"] #v01-s3 {
        font-size: 170px;
      }
      [data-composition-id="v01-kinetic-type"] .v01-accent {
        color: #37bdf8;
        text-shadow: 0 0 40px rgba(55,189,248,0.5);
      }
      [data-composition-id="v01-kinetic-type"] .v01-hot {
        color: #f09025;
        text-shadow: 0 0 40px rgba(240,144,37,0.55);
      }
      /* shimmer-sweep component styles (inlined) */
      [data-composition-id="v01-kinetic-type"] .shimmer-sweep-target {
        position: relative;
      }
      [data-composition-id="v01-kinetic-type"] .shimmer-sweep-target .shimmer-mask {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background: linear-gradient(
          120deg,
          transparent 0%,
          transparent calc(var(--shimmer-pos, -20%) - 10%),
          rgba(255,255,255,0.75) var(--shimmer-pos, -20%),
          transparent calc(var(--shimmer-pos, -20%) + 10%),
          transparent 100%
        );
        mix-blend-mode: overlay;
      }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};

        // Inject shimmer-mask into shimmer-sweep-targets
        document.querySelectorAll('[data-composition-id="v01-kinetic-type"] .shimmer-sweep-target').forEach((el) => {
          if (!el.querySelector(".shimmer-mask")) {
            const mask = document.createElement("div");
            mask.className = "shimmer-mask";
            el.appendChild(mask);
          }
        });

        const tl = gsap.timeline({ paused: true });

        // Stanza 1: WRITE HTML. (0 - 2.2s)
        tl.set("#v01-s1", { opacity: 1 }, 0);
        tl.fromTo("#v01-s1 .v01-w", { opacity: 0, y: 50, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.35, ease: "back.out(1.7)", stagger: 0.15 }, 0.15);
        tl.to("#v01-s1", { opacity: 0, filter: "blur(14px)", duration: 0.3, ease: "power2.in" }, 2.0);

        // Stanza 2: RENDER VIDEO. (2.3 - 4.4s)
        tl.set("#v01-s2", { opacity: 1 }, 2.25);
        tl.fromTo("#v01-s2 .v01-w", { opacity: 0, y: 50, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.35, ease: "back.out(1.7)", stagger: 0.15 }, 2.35);
        tl.to("#v01-s2", { opacity: 0, filter: "blur(14px)", duration: 0.3, ease: "power2.in" }, 4.2);

        // Stanza 3: BUILT FOR AGENTS. (4.5 - 7s)
        tl.set("#v01-s3", { opacity: 1 }, 4.5);
        tl.fromTo("#v01-s3 .v01-w", { opacity: 0, y: 50, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.35, ease: "back.out(1.7)", stagger: 0.15 }, 4.6);

        // Shimmer sweep across BUILT (5.3 - 6.3s)
        tl.fromTo("#v01-s3 .shimmer-sweep-target", { "--shimmer-pos": "-30%" }, { "--shimmer-pos": "130%", duration: 1.0, ease: "power2.inOut" }, 5.3);

        // Final hold + subtle scale-down
        tl.to("#v01-s3", { scale: 0.96, opacity: 0.92, duration: 0.4, ease: "power2.out" }, 6.5);

        window.__timelines["v01-kinetic-type"] = tl;
      })();
    </script>
  </div>
</template>
