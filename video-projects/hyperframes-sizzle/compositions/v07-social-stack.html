    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="v07-social-stack"]';

        tl.to(`${root} .v07-bg-glow`, { opacity: 1, duration: 0.8 }, 0);

        // Cascade in the 4 cards from below-right like tarot draw
        const cards = [
          { sel: ".v07-ig", r: -8, delay: 0.1 },
          { sel: ".v07-tt", r: -3, delay: 0.35 },
          { sel: ".v07-x",  r: 4,  delay: 0.6 },
          { sel: ".v07-yt", r: 10, delay: 0.85 },
        ];
        cards.forEach((c) => {
          tl.fromTo(`${root} ${c.sel}`,
            { y: 800, opacity: 0, rotate: c.r + 30, scale: 0.7 },
            { y: 0, opacity: 1, rotate: c.r, scale: 1, duration: 0.7, ease: "back.out(1.2)" },
            c.delay
          );
        });

        // Subtle float
        tl.to(`${root} .v07-ig`, { y: -15, duration: 1.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, 2.2);
        tl.to(`${root} .v07-tt`, { y: 10, duration: 1.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, 2.3);
        tl.to(`${root} .v07-x`,  { y: -12, duration: 1.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, 2.4);
        tl.to(`${root} .v07-yt`, { y: 14, duration: 1.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, 2.5);

        // Badge

        // Final card push 5.4
        tl.to(`${root} .v07-card`, { scale: 1.04, duration: 0.5, ease: "power2.out" }, 5.4);

        window.__timelines["v07-social-stack"] = tl;
