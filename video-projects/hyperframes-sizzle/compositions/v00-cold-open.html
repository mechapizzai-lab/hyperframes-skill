<template id="v00-cold-open-template">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <div
    data-composition-id="v00-cold-open"
    data-start="0"
    data-duration="4"
    data-width="1920"
    data-height="1080"
  >
    <div class="v00-root">
      <div class="v00-grid"></div>
      <div class="v00-vignette"></div>

      <div class="v00-terminal">
        <div class="v00-term-bar">
          <span class="v00-dot" style="background:#ff5f57"></span>
          <span class="v00-dot" style="background:#febc2e"></span>
          <span class="v00-dot" style="background:#28c840"></span>
          <span class="v00-term-title">zsh — hyperframes-sizzle</span>
        </div>
        <div class="v00-term-body">
          <div class="v00-line" id="v00-line1"><span class="v00-prompt">$</span> <span id="v00-cmd"></span><span class="v00-caret" id="v00-caret">▎</span></div>
          <div class="v00-line v00-dim" id="v00-line2">→ rendering 75s @ 1920×1080 @ 30fps</div>
          <div class="v00-line v00-dim" id="v00-line3">→ 2,250 frames / 11 sub-compositions</div>
        </div>
      </div>

      <div class="v00-title" id="v00-title">
        <div class="v00-title-top">HYPERFRAMES</div>
        <div class="v00-title-x">×</div>
        <div class="v00-title-bot">CLAUDE CODE</div>
      </div>

      <div class="v00-flash" id="v00-flash"></div>
    </div>

    <style>
      [data-composition-id="v00-cold-open"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="v00-cold-open"] .v00-root {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 70% 60% at 50% 45%, #0f2033 0%, #07121c 70%, #030812 100%);
        overflow: hidden;
      }
      [data-composition-id="v00-cold-open"] .v00-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(55,189,248,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(55,189,248,0.05) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0.6;
      }
      [data-composition-id="v00-cold-open"] .v00-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(3,8,18,0.5) 100%);
        pointer-events: none;
      }
      [data-composition-id="v00-cold-open"] .v00-terminal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.92);
        width: 1200px;
        background: rgba(13,32,49,0.88);
        border: 1px solid rgba(55,189,248,0.28);
        border-radius: 14px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(55,189,248,0.04);
        overflow: hidden;
        opacity: 0;
        backdrop-filter: blur(10px);
      }
      [data-composition-id="v00-cold-open"] .v00-term-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 20px;
        background: rgba(7,18,28,0.65);
        border-bottom: 1px solid rgba(55,189,248,0.18);
      }
      [data-composition-id="v00-cold-open"] .v00-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
      }
      [data-composition-id="v00-cold-open"] .v00-term-title {
        margin-left: 16px;
        font-family: "Roboto Mono", monospace;
        font-size: 22px;
        color: #5a7a9a;
        letter-spacing: 0.08em;
      }
      [data-composition-id="v00-cold-open"] .v00-term-body {
        padding: 36px 48px 40px;
        font-family: "Roboto Mono", monospace;
        font-size: 40px;
        line-height: 1.7;
        color: #f5f7fa;
      }
      [data-composition-id="v00-cold-open"] .v00-prompt {
        color: #37bdf8;
        font-weight: 700;
      }
      [data-composition-id="v00-cold-open"] .v00-dim {
        color: #5a7a9a;
        font-size: 34px;
        opacity: 0;
      }
      [data-composition-id="v00-cold-open"] .v00-caret {
        color: #37bdf8;
        display: inline-block;
        opacity: 1;
      }
      [data-composition-id="v00-cold-open"] .v00-title {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.92);
        text-align: center;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1;
        opacity: 0;
      }
      [data-composition-id="v00-cold-open"] .v00-title-top,
      [data-composition-id="v00-cold-open"] .v00-title-bot {
        font-size: 170px;
        color: #f5f7fa;
        text-shadow: 0 0 40px rgba(55,189,248,0.45);
      }
      [data-composition-id="v00-cold-open"] .v00-title-bot {
        color: #f09025;
        text-shadow: 0 0 40px rgba(240,144,37,0.55);
      }
      [data-composition-id="v00-cold-open"] .v00-title-x {
        font-size: 92px;
        color: #37bdf8;
        margin: 8px 0;
        font-weight: 300;
      }
      [data-composition-id="v00-cold-open"] .v00-flash {
        position: absolute;
        inset: 0;
        background: #f5f7fa;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const cmd = "npx hyperframes render --quality high";
        const cmdEl = document.getElementById("v00-cmd");
        const caretEl = document.getElementById("v00-caret");

        // Terminal reveal 0 - 0.25
        tl.fromTo(".v00-terminal", { opacity: 0, scale: 0.88, y: 20 }, { opacity: 1, scale: 0.92, y: 0, duration: 0.25, ease: "power3.out" }, 0);

        // Type-on 0.3 - 1.4 (1.1s, still ~31 cps — readable)
        const typeDuration = 1.1;
        tl.to({}, {
          duration: typeDuration,
          onUpdate: function () {
            const p = this.progress();
            const n = Math.floor(p * cmd.length);
            cmdEl.textContent = cmd.slice(0, n);
          },
        }, 0.3);

        // Caret blink through the typing window
        tl.to(caretEl, { opacity: 0, duration: 0.001, repeat: 12, yoyo: true, repeatDelay: 0.18 }, 0.3);

        // Dim lines 1.4 - 1.65
        tl.to("#v00-line2", { opacity: 0.8, duration: 0.15 }, 1.4);
        tl.to("#v00-line3", { opacity: 0.7, duration: 0.15 }, 1.5);

        // Terminal squashes + flash 1.7 - 2.1
        tl.to(".v00-terminal", { scale: 0.80, opacity: 0.3, duration: 0.25, ease: "power2.in" }, 1.7);
        tl.fromTo("#v00-flash", { opacity: 0 }, { opacity: 1, duration: 0.15, ease: "power3.in" }, 1.85);
        tl.to("#v00-flash", { opacity: 0, duration: 0.45, ease: "power2.out" }, 2.05);

        // Title reveal 2.0 - 2.5, then hero hold through 4.0 (1.5s)
        tl.fromTo(".v00-title", { opacity: 0, scale: 0.86 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 2.0);
        tl.fromTo(".v00-title-x", { rotate: -45, scale: 0 }, { rotate: 0, scale: 1, duration: 0.4, ease: "back.out(2)" }, 2.15);

        // Pad to 4s
        tl.set({}, {}, 4);

        window.__timelines["v00-cold-open"] = tl;
      })();
    </script>
  </div>
</template>
