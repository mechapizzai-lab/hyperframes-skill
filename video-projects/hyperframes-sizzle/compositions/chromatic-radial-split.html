<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Lato:wght@400;700&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="chromatic-radial-split"
      data-start="0"
      data-duration="3.5"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="chromatic-radial-split"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: #0a1628;
        }

        /* Blueprint grid */
        .bp-grid {
          position: absolute;
          inset: 0;
          background-image:
            linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
          background-size: 40px 40px;
          pointer-events: none;
        }

        /* Layout */
        .bp-left {
          position: absolute;
          left: 0;
          top: 0;
          bottom: 0;
          width: 1200px;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .bp-right {
          position: absolute;
          right: 0;
          top: 0;
          bottom: 0;
          width: 720px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 60px 60px 60px 40px;
        }
        .bp-divider {
          position: absolute;
          left: 1200px;
          top: 60px;
          bottom: 60px;
          width: 1px;
          background: #f09025;
          opacity: 0.2;
        }
        .bp-number {
          font-family: "Space Mono", monospace;
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 0.4em;
          text-transform: uppercase;
          position: absolute;
          top: 40px;
          left: 60px;
          color: #f09025;
        }

        /* Right panel typography */
        .bp-name {
          font-family: "Bebas Neue", sans-serif;
          font-size: 42px;
          letter-spacing: 0.08em;
          margin-bottom: 20px;
          color: #f09025;
          text-shadow: 0 0 24px rgba(240, 144, 37, 0.45);
        }
        .bp-plabel {
          font-family: "Space Mono", monospace;
          font-size: 12px;
          font-weight: 700;
          letter-spacing: 0.32em;
          text-transform: uppercase;
          margin-bottom: 10px;
          color: #f09025;
          opacity: 0.8;
        }
        .bp-prompt {
          font-family: "JetBrains Mono", monospace;
          font-size: 20px;
          line-height: 1.6;
          padding: 18px 22px;
          border-radius: 8px;
          margin-bottom: 22px;
          color: #f09025;
          background: rgba(240, 144, 37, 0.08);
          border: 1px solid rgba(240, 144, 37, 0.22);
          box-shadow: 0 0 28px rgba(240, 144, 37, 0.12) inset;
        }
        .bp-desc {
          font-family: "Lato", sans-serif;
          font-size: 18px;
          line-height: 1.6;
          color: #e8d4bd;
          opacity: 0.85;
        }

        /* Fallback animation layer (GSAP-driven, not CSS keyframes, because
           Hyperframes' deterministic frame capture freezes CSS animations).
           Sits below the GL canvas (z-index 5 vs canvas z-index 10). */
        .bp-fallback {
          position: absolute;
          inset: 0;
          z-index: 5;
          background: #0a1628;
          pointer-events: none;
          overflow: hidden;
        }
        .bp-fallback-blob {
          position: absolute;
          top: 50%;
          left: 50%;
          width: 1400px;
          height: 1400px;
          border-radius: 50%;
          transform: translate(-50%, -50%);
          filter: blur(80px);
          mix-blend-mode: screen;
          will-change: transform, opacity;
        }
        .bp-fallback-blob.cyan {
          background: radial-gradient(circle, rgba(55, 189, 248, 0.9) 0%, rgba(55, 189, 248, 0) 55%);
        }
        .bp-fallback-blob.orange {
          background: radial-gradient(circle, rgba(240, 144, 37, 0.9) 0%, rgba(240, 144, 37, 0) 55%);
          opacity: 0;
        }
        .bp-fallback-label {
          position: absolute;
          top: 50%;
          left: 50%;
          z-index: 20;
          font-family: "Bebas Neue", sans-serif;
          font-size: 180px;
          font-weight: 700;
          letter-spacing: 0.06em;
          color: #ffffff;
          opacity: 0.95;
          white-space: nowrap;
          text-shadow:
            0 0 40px rgba(10, 22, 40, 0.95),
            0 0 24px rgba(10, 22, 40, 0.85),
            0 0 12px rgba(0, 0, 0, 0.8);
          will-change: transform, opacity;
        }

        /* GL scenes (hidden, just for texture capture) */
        .scene {
          position: absolute;
          top: 0;
          left: 0;
          width: 1200px;
          height: 1080px;
          overflow: hidden;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .scene-label {
          font-family: "Bebas Neue", sans-serif;
          font-size: 180px;
          letter-spacing: 0.06em;
          opacity: 0.85;
          font-weight: 700;
        }
      </style>

      <div class="bp-grid"></div>
      <div class="bp-divider"></div>
      <div class="bp-number">08 / 14</div>

      <!-- GSAP-driven fallback layer — carries the beat visually if software WebGL stalls -->
      <div class="bp-left">
        <div class="bp-fallback">
          <div class="bp-fallback-blob cyan" id="bp-blob-cyan"></div>
          <div class="bp-fallback-blob orange" id="bp-blob-orange"></div>
        </div>
        <div class="bp-fallback-label" id="bp-fallback-label">PROMPT</div>
      </div>

      <!-- GL demo scenes (captured as textures, then hidden) -->
      <div id="s1" class="scene" style="background: #0a1628">
        <div class="scene-label" style="color: #37bdf8">PROMPT</div>
      </div>
      <div id="s2" class="scene" style="background: #f09025; opacity: 0">
        <div class="scene-label" style="color: #0a1628">RENDER</div>
      </div>

      <!-- GL canvas (left panel only, sits above CSS fallback) -->
      <canvas
        id="gl-canvas"
        width="1200"
        height="1080"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 1200px;
          height: 1080px;
          z-index: 10;
          pointer-events: none;
          display: none;
        "
      >
      </canvas>

      <!-- Right panel metadata -->
      <div class="bp-right">
        <div class="bp-name">Chromatic Radial Split</div>
        <div class="bp-plabel">Prompt</div>
        <div class="bp-prompt">npx hyperframes add chromatic-radial-split</div>
        <div class="bp-desc">
          RGB channels separate and converge radially. From-scene splits outward, to-scene
          converges inward — clean prompt-to-render reveal.
        </div>
      </div>

      <div
        id="driver"
        data-start="0"
        data-duration="3.5"
        data-track-index="0"
        style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var glCanvas = document.getElementById("gl-canvas");
      var gl = glCanvas.getContext("webgl", { preserveDrawingBuffer: true });
      // Fallback-label swap handle (works even if WebGL is unavailable)
      var fallbackLabel = document.getElementById("bp-fallback-label");
      var cyanBlob = document.getElementById("bp-blob-cyan");
      var orangeBlob = document.getElementById("bp-blob-orange");
      function swapFallbackLabel(text) {
        if (fallbackLabel) fallbackLabel.textContent = text;
      }
      // Builds the GSAP-driven fallback tweens onto a given timeline.
      // Splits two colored blobs apart, blurs through, then converges on the orange side.
      function buildFallbackTweens(targetTl) {
        // xPercent/yPercent give GSAP-native centering that survives subsequent tweens
        targetTl.set(cyanBlob, { xPercent: -50, yPercent: -50, x: 0, scale: 1, opacity: 0.9 }, 0);
        targetTl.set(orangeBlob, { xPercent: -50, yPercent: -50, x: 0, scale: 1, opacity: 0 }, 0);
        targetTl.set(fallbackLabel, { xPercent: -50, yPercent: -50, x: 0, scale: 1, opacity: 0.95 }, 0);
        // Phase 1 (0 → 1.75s): cyan blob splits left, orange fades in splitting right, label compresses
        targetTl.to(cyanBlob, { x: -420, scale: 1.12, duration: 1.75, ease: "power2.inOut" }, 0);
        targetTl.to(orangeBlob, { x: 420, scale: 1.12, opacity: 0.9, duration: 1.75, ease: "power2.inOut" }, 0);
        targetTl.to(fallbackLabel, { scale: 0.9, opacity: 0.3, duration: 1.4, ease: "power2.in" }, 0.2);
        // Mid-point swap: PROMPT → RENDER
        targetTl.call(function () { swapFallbackLabel("RENDER"); }, null, 1.75);
        // Phase 2 (1.75 → 3.5s): blobs converge back, label scales up on orange side
        targetTl.to(cyanBlob, { x: 0, scale: 1, opacity: 0.35, duration: 1.75, ease: "power2.inOut" }, 1.75);
        targetTl.to(orangeBlob, { x: 0, scale: 1, opacity: 1, duration: 1.75, ease: "power2.inOut" }, 1.75);
        targetTl.to(fallbackLabel, { scale: 1, opacity: 0.98, duration: 1.4, ease: "power2.out" }, 1.85);
      }

      if (!gl) {
        console.warn("WebGL not available — GSAP fallback will carry the beat");
        var tlNoGl = gsap.timeline({ paused: true });
        buildFallbackTweens(tlNoGl);
        tlNoGl.to({ v: 0 }, { v: 1, duration: 3.5, ease: "none" }, 0);
        window.__timelines["chromatic-radial-split"] = tlNoGl;
      } else {
        gl.viewport(0, 0, 1200, 1080);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
        var sceneTextures = {};

        function captureScene(sceneId) {
          var scene = document.getElementById(sceneId);
          var origOpacity = scene.style.opacity;
          var origZ = scene.style.zIndex;
          scene.style.opacity = "1";
          scene.style.zIndex = "999";
          scene.offsetHeight;
          var c = document.createElement("canvas");
          c.width = 1200;
          c.height = 1080;
          var ctx = c.getContext("2d");
          ctx.fillStyle = window.getComputedStyle(scene).backgroundColor;
          ctx.fillRect(0, 0, 1200, 1080);
          var sr = scene.getBoundingClientRect();
          var els = scene.querySelectorAll("*");
          for (var i = 0; i < els.length; i++) {
            var el = els[i],
              cs = window.getComputedStyle(el);
            if (cs.display === "none" || cs.visibility === "hidden") continue;
            var r = el.getBoundingClientRect();
            if (r.width < 1 || r.height < 1) continue;
            var x = r.left - sr.left,
              y = r.top - sr.top,
              w = r.width,
              h = r.height;
            ctx.save();
            ctx.globalAlpha = parseFloat(cs.opacity) || 1;
            var bg = cs.backgroundColor;
            if (bg && bg !== "rgba(0, 0, 0, 0)" && bg !== "transparent") {
              ctx.fillStyle = bg;
              ctx.fillRect(x, y, w, h);
            }
            var hasChildEls = el.querySelector("div,span,img,video");
            var text = "";
            for (var j = 0; j < el.childNodes.length; j++)
              if (el.childNodes[j].nodeType === 3) text += el.childNodes[j].textContent;
            text = text.trim();
            if (text && !hasChildEls) {
              ctx.font = cs.fontWeight + " " + cs.fontSize + " " + cs.fontFamily;
              ctx.fillStyle = cs.color;
              if (cs.letterSpacing && cs.letterSpacing !== "normal")
                ctx.letterSpacing = cs.letterSpacing;
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(text, x + w / 2, y + h / 2);
            }
            ctx.restore();
          }
          scene.style.opacity = origOpacity;
          scene.style.zIndex = origZ;
          var tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, c);
          sceneTextures[sceneId] = tex;
        }

        var vertSrc =
          "attribute vec2 a_pos; varying vec2 v_uv; void main(){" +
          "v_uv=a_pos*0.5+0.5; v_uv.y=1.0-v_uv.y; gl_Position=vec4(a_pos,0,1);}";
        var quadBuf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
        gl.bufferData(
          gl.ARRAY_BUFFER,
          new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
          gl.STATIC_DRAW,
        );
        function compileShader(src, type) {
          var s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
            console.error("Shader:", gl.getShaderInfoLog(s));
          return s;
        }
        function mkProg(fragSrc) {
          var p = gl.createProgram();
          gl.attachShader(p, compileShader(vertSrc, gl.VERTEX_SHADER));
          gl.attachShader(p, compileShader(fragSrc, gl.FRAGMENT_SHADER));
          gl.linkProgram(p);
          if (!gl.getProgramParameter(p, gl.LINK_STATUS))
            console.error("Link:", gl.getProgramInfoLog(p));
          return p;
        }

        var H =
          "precision mediump float;" +
          "varying vec2 v_uv;" +
          "uniform sampler2D u_from, u_to;" +
          "uniform float u_progress;" +
          "uniform vec2 u_resolution;\n";

        var progPass = mkProg(H + "void main(){gl_FragColor=texture2D(u_from,v_uv);}");
        var progTrans = mkProg(
          H +
            "void main(){vec2 c=v_uv-.5;float fromShift=u_progress*.32;float fr=texture2D(u_from,clamp(v_uv+c*fromShift,0.,1.)).r;float fg=texture2D(u_from,v_uv).g;float fb=texture2D(u_from,clamp(v_uv-c*fromShift,0.,1.)).b;vec3 fromSplit=vec3(fr,fg,fb);float toShift=(1.-u_progress)*.32;float tr=texture2D(u_to,clamp(v_uv-c*toShift,0.,1.)).r;float tg=texture2D(u_to,v_uv).g;float tb=texture2D(u_to,clamp(v_uv+c*toShift,0.,1.)).b;vec3 toSplit=vec3(tr,tg,tb);gl_FragColor=vec4(mix(fromSplit,toSplit,u_progress),1.);}",
        );

        function renderShader(prog, texFrom, texTo, progress) {
          gl.useProgram(prog);
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, texFrom);
          gl.uniform1i(gl.getUniformLocation(prog, "u_from"), 0);
          gl.activeTexture(gl.TEXTURE1);
          gl.bindTexture(gl.TEXTURE_2D, texTo);
          gl.uniform1i(gl.getUniformLocation(prog, "u_to"), 1);
          gl.uniform1f(gl.getUniformLocation(prog, "u_progress"), progress);
          gl.uniform2f(gl.getUniformLocation(prog, "u_resolution"), 1200, 1080);
          var pos = gl.getAttribLocation(prog, "a_pos");
          gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
          gl.enableVertexAttribArray(pos);
          gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        function easeInOut(p) {
          return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
        }

        var capturesReady = false;
        function doCaptures() {
          captureScene("s1");
          captureScene("s2");
          glCanvas.style.display = "block";
          renderShader(progPass, sceneTextures["s1"], sceneTextures["s1"], 0);
          document.querySelectorAll(".scene").forEach(function (s) {
            s.style.opacity = "0";
          });
          capturesReady = true;
        }
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(doCaptures);
        } else {
          doCaptures();
        }

        // Shader transition window: 25% → 75% of the 3.5s slot (0.875 → 2.625)
        var TRANS_IN = 0.875;
        var TRANS_OUT = 2.625;
        var tl = gsap.timeline({
          paused: true,
          onUpdate: function () {
            if (!capturesReady) return;
            var t = tl.time();
            if (t >= TRANS_IN && t < TRANS_OUT) {
              renderShader(
                progTrans,
                sceneTextures["s1"],
                sceneTextures["s2"],
                easeInOut((t - TRANS_IN) / (TRANS_OUT - TRANS_IN)),
              );
            } else if (t >= TRANS_OUT) {
              renderShader(progPass, sceneTextures["s2"], sceneTextures["s2"], 0);
            } else {
              renderShader(progPass, sceneTextures["s1"], sceneTextures["s1"], 0);
            }
          },
        });
        buildFallbackTweens(tl);
        tl.to({ v: 0 }, { v: 1, duration: 3.5, ease: "none" }, 0);
        window.__timelines["chromatic-radial-split"] = tl;
      } // end if (gl)
    </script>
  </body>
</html>
