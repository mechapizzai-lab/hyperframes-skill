<template id="v02-data-chart-template">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <div
    data-composition-id="v02-data-chart"
    data-start="0"
    data-duration="7"
    data-width="1920"
    data-height="1080"
  >
    <div class="v02-root">
      <div class="v02-grid"></div>

      <div class="v02-header">
        <div class="v02-kicker">EDIT TIME COMPARISON</div>
        <div class="v02-title">Hours to ship a <span class="v02-accent">90-second video</span></div>
      </div>

      <div class="v02-chart">
        <div class="v02-row" data-row="0">
          <div class="v02-label">PREMIERE PRO</div>
          <div class="v02-bar-wrap"><div class="v02-bar" data-w="92"></div><div class="v02-val">6.5 hrs</div></div>
        </div>
        <div class="v02-row" data-row="1">
          <div class="v02-label">FINAL CUT</div>
          <div class="v02-bar-wrap"><div class="v02-bar" data-w="78"></div><div class="v02-val">5.5 hrs</div></div>
        </div>
        <div class="v02-row" data-row="2">
          <div class="v02-label">AFTER EFFECTS</div>
          <div class="v02-bar-wrap"><div class="v02-bar" data-w="100"></div><div class="v02-val">7.0 hrs</div></div>
        </div>
        <div class="v02-row v02-row-hero" data-row="3">
          <div class="v02-label">HYPERFRAMES</div>
          <div class="v02-bar-wrap"><div class="v02-bar v02-bar-hero" data-w="3"></div><div class="v02-val v02-val-hero">~13 min</div></div>
        </div>
      </div>

      <div class="v02-footer">
        <div class="v02-stamp" id="v02-stamp">0 TIMELINE EDITS · 1 PROMPT · 1 RENDER</div>
      </div>
    </div>

    <style>
      [data-composition-id="v02-data-chart"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="v02-data-chart"] .v02-root {
        position: absolute;
        inset: 0;
        background: linear-gradient(160deg, #faf9f5 0%, #f0eee6 100%);
        padding: 110px 140px 80px;
        box-sizing: border-box;
      }
      [data-composition-id="v02-data-chart"] .v02-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(20,20,19,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(20,20,19,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }
      [data-composition-id="v02-data-chart"] .v02-header {
        margin-bottom: 60px;
        opacity: 0;
      }
      [data-composition-id="v02-data-chart"] .v02-kicker {
        font-family: "Roboto Mono", monospace;
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 0.32em;
        color: #5e5d59;
        margin-bottom: 18px;
      }
      [data-composition-id="v02-data-chart"] .v02-title {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 82px;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: #141413;
      }
      [data-composition-id="v02-data-chart"] .v02-accent {
        color: #c6613f;
        font-style: italic;
        font-weight: 800;
      }
      [data-composition-id="v02-data-chart"] .v02-chart {
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      [data-composition-id="v02-data-chart"] .v02-row {
        display: flex;
        align-items: center;
        gap: 36px;
        opacity: 0;
      }
      [data-composition-id="v02-data-chart"] .v02-label {
        width: 360px;
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 0.1em;
        color: #3d3d3a;
        text-align: right;
      }
      [data-composition-id="v02-data-chart"] .v02-row-hero .v02-label {
        color: #141413;
        font-weight: 700;
      }
      [data-composition-id="v02-data-chart"] .v02-bar-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 22px;
        height: 56px;
      }
      [data-composition-id="v02-data-chart"] .v02-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #b0aea5 0%, #8a887f 100%);
        border-radius: 4px;
      }
      [data-composition-id="v02-data-chart"] .v02-bar-hero {
        background: linear-gradient(90deg, #f09025 0%, #ff6b00 100%);
        box-shadow: 0 0 30px rgba(240,144,37,0.45), 0 0 0 1px rgba(240,144,37,0.35);
      }
      [data-composition-id="v02-data-chart"] .v02-val {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 34px;
        color: #3d3d3a;
        opacity: 0;
      }
      [data-composition-id="v02-data-chart"] .v02-val-hero {
        color: #c6613f;
        font-size: 42px;
      }
      [data-composition-id="v02-data-chart"] .v02-footer {
        position: absolute;
        bottom: 60px;
        left: 140px;
      }
      [data-composition-id="v02-data-chart"] .v02-stamp {
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.28em;
        color: #141413;
        padding: 14px 24px;
        background: #141413;
        color: #faf9f5;
        display: inline-block;
        opacity: 0;
        transform: scale(0.94);
      }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="v02-data-chart"]';

        // Header reveal 0 - 0.6
        tl.fromTo(`${root} .v02-header`, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 0);

        // Rows appear (0.6 - 1.8), bar widths animate staggered
        const rows = document.querySelectorAll('[data-composition-id="v02-data-chart"] .v02-row');
        rows.forEach((row, i) => {
          const at = 0.6 + i * 0.3;
          const bar = row.querySelector(".v02-bar");
          const val = row.querySelector(".v02-val");
          const w = parseFloat(bar.getAttribute("data-w"));
          tl.fromTo(row, { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.35, ease: "power2.out" }, at);
          tl.to(bar, { width: w + "%", duration: 1.2, ease: "power3.out" }, at + 0.1);
          tl.to(val, { opacity: 1, duration: 0.3 }, at + 1.1);
        });

        // Hero bar emphasis pulse (around 3.2s)
        tl.to(`${root} .v02-bar-hero`, { scale: 1.04, duration: 0.3, ease: "power2.out", yoyo: true, repeat: 1 }, 3.2);

        // Stamp reveal (4.8s)
        tl.to(`${root} .v02-stamp`, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 4.8);

        // Hold + very subtle exit
        tl.to(`${root} .v02-root`, { opacity: 0.92, duration: 0.3 }, 6.6);

        window.__timelines["v02-data-chart"] = tl;
      })();
    </script>
  </div>
</template>
