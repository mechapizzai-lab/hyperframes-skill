<template id="v05-web-to-video-template">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <div
    data-composition-id="v05-web-to-video"
    data-start="0"
    data-duration="10"
    data-width="1920"
    data-height="1080"
  >
    <div class="v05-root">
      <!-- Phase 1: Terminal command -->
      <div class="v05-cmd" id="v05-cmd">
        <span class="v05-prompt">$</span> <span class="v05-cmd-text">npx hyperframes capture <span class="v05-url">https://anthropic.com</span></span><span class="v05-caret">▎</span>
      </div>

      <!-- Phase 2: Screenshot zoom -->
      <div class="v05-browser" id="v05-browser">
        <div class="v05-browser-chrome">
          <span class="v05-browser-dot" style="background:#ff5f57"></span>
          <span class="v05-browser-dot" style="background:#febc2e"></span>
          <span class="v05-browser-dot" style="background:#28c840"></span>
          <span class="v05-browser-url">anthropic.com</span>
        </div>
        <div class="v05-browser-body">
          <img class="v05-screenshot" src="assets/anthropic-capture/screenshots/scroll-000.png" alt="" />
        </div>
      </div>

      <!-- Phase 3: Extracted palette swatches -->
      <div class="v05-palette" id="v05-palette">
        <div class="v05-swatch" data-color="#141413" style="background:#141413"><span>#141413</span></div>
        <div class="v05-swatch" data-color="#FAF9F5" style="background:#FAF9F5;color:#141413"><span>#FAF9F5</span></div>
        <div class="v05-swatch" data-color="#C6613F" style="background:#C6613F"><span>#C6613F</span></div>
        <div class="v05-swatch" data-color="#D97757" style="background:#D97757"><span>#D97757</span></div>
      </div>

      <!-- Phase 4: Extracted fonts -->
      <div class="v05-fonts" id="v05-fonts">
        <div class="v05-font-item">
          <div class="v05-font-name" style="font-family:Georgia, 'Times New Roman', serif">Anthropic Serif</div>
          <div class="v05-font-tag">DISPLAY · PARAGRAPH</div>
        </div>
        <div class="v05-font-item">
          <div class="v05-font-name" style="font-family:Arial, sans-serif">Anthropic Sans</div>
          <div class="v05-font-tag">UI · DETAIL</div>
        </div>
      </div>

      <!-- Phase 5: Rendered trailer preview using extracted brand -->
      <div class="v05-trailer" id="v05-trailer">
        <div class="v05-trailer-bg"></div>
        <div class="v05-trailer-kicker">INTRODUCING</div>
        <div class="v05-trailer-title">Claude 4.7 Opus</div>
        <div class="v05-trailer-tag">Reasoning for coding.</div>
        <div class="v05-trailer-cta">Try it today →</div>
      </div>

      <!-- Overlay badge -->
      <div class="v05-badge" id="v05-badge">1 URL → 60s TRAILER</div>
    </div>

    <style>
      [data-composition-id="v05-web-to-video"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="v05-web-to-video"] .v05-root {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 80% 70% at 50% 50%, #0d1a2b 0%, #07121c 70%, #030812 100%);
      }
      [data-composition-id="v05-web-to-video"] .v05-cmd {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 48px;
        color: #f5f7fa;
        background: rgba(13,32,49,0.8);
        border: 1px solid rgba(55,189,248,0.3);
        padding: 26px 40px;
        border-radius: 12px;
        opacity: 0;
        white-space: nowrap;
      }
      [data-composition-id="v05-web-to-video"] .v05-prompt { color: #37bdf8; font-weight: 700; }
      [data-composition-id="v05-web-to-video"] .v05-url { color: #f09025; }
      [data-composition-id="v05-web-to-video"] .v05-caret {
        color: #37bdf8;
        display: inline-block;
        margin-left: 4px;
      }
      [data-composition-id="v05-web-to-video"] .v05-browser {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1400px;
        height: 800px;
        transform: translate(-50%, -50%) scale(0.85);
        background: #0a0a0f;
        border-radius: 14px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        overflow: hidden;
        opacity: 0;
      }
      [data-composition-id="v05-web-to-video"] .v05-browser-chrome {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 20px;
        background: #16181e;
        border-bottom: 1px solid #2a2d35;
      }
      [data-composition-id="v05-web-to-video"] .v05-browser-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      [data-composition-id="v05-web-to-video"] .v05-browser-url {
        margin-left: 16px;
        font-family: "Roboto Mono", monospace;
        font-size: 18px;
        color: #96a2b6;
        background: #0a0a0f;
        padding: 6px 16px;
        border-radius: 6px;
      }
      [data-composition-id="v05-web-to-video"] .v05-browser-body {
        width: 100%;
        height: calc(100% - 48px);
        overflow: hidden;
        background: #141413;
      }
      [data-composition-id="v05-web-to-video"] .v05-screenshot {
        width: 100%;
        height: auto;
        display: block;
      }
      [data-composition-id="v05-web-to-video"] .v05-palette {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        gap: 32px;
        opacity: 0;
      }
      [data-composition-id="v05-web-to-video"] .v05-swatch {
        width: 220px;
        height: 220px;
        border-radius: 14px;
        display: flex;
        align-items: flex-end;
        padding: 18px 22px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.12em;
        color: #faf9f5;
        transform: scale(0.4);
        opacity: 0;
      }
      [data-composition-id="v05-web-to-video"] .v05-fonts {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        gap: 48px;
        opacity: 0;
        text-align: center;
      }
      [data-composition-id="v05-web-to-video"] .v05-font-item {
        opacity: 0;
        transform: translateY(30px);
      }
      [data-composition-id="v05-web-to-video"] .v05-font-name {
        font-size: 160px;
        font-weight: 400;
        color: #faf9f5;
        line-height: 1;
      }
      [data-composition-id="v05-web-to-video"] .v05-font-tag {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.32em;
        color: #c6613f;
        margin-top: 14px;
      }
      [data-composition-id="v05-web-to-video"] .v05-trailer {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1400px;
        height: 800px;
        border-radius: 14px;
        overflow: hidden;
        opacity: 0;
        box-shadow: 0 40px 120px rgba(0,0,0,0.6);
      }
      [data-composition-id="v05-web-to-video"] .v05-trailer-bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at 70% 80%, #c6613f 0%, transparent 55%),
          radial-gradient(ellipse at 30% 30%, #d97757 0%, transparent 50%),
          #faf9f5;
      }
      [data-composition-id="v05-web-to-video"] .v05-trailer-kicker {
        position: absolute;
        top: 80px;
        left: 80px;
        font-family: Arial, sans-serif;
        font-weight: 600;
        font-size: 28px;
        letter-spacing: 0.32em;
        color: #141413;
        opacity: 0.55;
      }
      [data-composition-id="v05-web-to-video"] .v05-trailer-title {
        position: absolute;
        top: 200px;
        left: 80px;
        max-width: 1240px;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 400;
        font-size: 150px;
        line-height: 1;
        color: #141413;
        letter-spacing: -0.02em;
      }
      [data-composition-id="v05-web-to-video"] .v05-trailer-tag {
        position: absolute;
        top: 380px;
        left: 80px;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 400;
        font-size: 60px;
        color: #141413;
        font-style: italic;
      }
      [data-composition-id="v05-web-to-video"] .v05-trailer-cta {
        position: absolute;
        bottom: 80px;
        left: 80px;
        font-family: Arial, sans-serif;
        font-weight: 600;
        font-size: 42px;
        color: #faf9f5;
        background: #141413;
        padding: 22px 40px;
        border-radius: 60px;
      }
      [data-composition-id="v05-web-to-video"] .v05-badge {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 56px;
        letter-spacing: 0.04em;
        color: #f09025;
        background: #141413;
        padding: 18px 36px;
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        opacity: 0;
      }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '[data-composition-id="v05-web-to-video"]';

        // Phase 1: Terminal cmd (0 - 1.5s)
        tl.fromTo(`${root} .v05-cmd`, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.3)" }, 0.1);
        tl.to(`${root} .v05-cmd`, { opacity: 0, y: -40, duration: 0.3, ease: "power2.in" }, 1.3);

        // Phase 2: Browser + screenshot (1.4 - 3.5s)
        tl.fromTo(`${root} .v05-browser`, { opacity: 0, scale: 0.6, y: 40 }, { opacity: 1, scale: 0.85, y: 0, duration: 0.6, ease: "back.out(1.1)" }, 1.4);
        // Zoom in
        tl.to(`${root} .v05-browser`, { scale: 1.0, duration: 1.0, ease: "power2.inOut" }, 2.0);
        // Quick zoom exit
        tl.to(`${root} .v05-browser`, { scale: 1.4, opacity: 0, duration: 0.5, ease: "power2.in" }, 3.2);

        // Phase 3: Palette swatches explode out (3.5 - 5.3s)
        tl.fromTo(`${root} .v05-palette`, { opacity: 1 }, { opacity: 1, duration: 0.01 }, 3.5);
        tl.fromTo(`${root} .v05-swatch`, { scale: 0.4, opacity: 0, rotate: -20 }, { scale: 1, opacity: 1, rotate: 0, duration: 0.5, ease: "back.out(1.5)", stagger: 0.12 }, 3.55);
        tl.to(`${root} .v05-palette`, { scale: 1.05, duration: 0.4 }, 4.6);
        tl.to(`${root} .v05-palette`, { opacity: 0, scale: 0.85, duration: 0.3, ease: "power2.in" }, 5.0);

        // Phase 4: Fonts reveal (5.3 - 7.0s)
        tl.set(`${root} .v05-fonts`, { opacity: 1 }, 5.3);
        tl.to(`${root} .v05-font-item`, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out", stagger: 0.3 }, 5.4);
        tl.to(`${root} .v05-fonts`, { opacity: 0, y: -30, duration: 0.35, ease: "power2.in" }, 6.7);

        // Phase 5: Final trailer mockup (7.0 - 9.5s)
        tl.fromTo(`${root} .v05-trailer`, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.6, ease: "power3.out" }, 7.0);
        tl.fromTo(`${root} .v05-trailer-kicker`, { opacity: 0, x: -30 }, { opacity: 0.55, x: 0, duration: 0.4 }, 7.3);
        tl.fromTo(`${root} .v05-trailer-title`, { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 7.5);
        tl.fromTo(`${root} .v05-trailer-tag`, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 7.9);
        tl.fromTo(`${root} .v05-trailer-cta`, { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 8.4);

        // Badge slams in (8.4)
        tl.fromTo(`${root} .v05-badge`, { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" }, 8.5);
        tl.to(`${root} .v05-badge`, { scale: 1.06, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.inOut" }, 8.9);

        window.__timelines["v05-web-to-video"] = tl;
      })();
    </script>
  </div>
</template>
