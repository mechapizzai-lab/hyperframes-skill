<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Hyperframes × Claude Code — Sizzle Reel</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #030812;
        font-family: "Montserrat", sans-serif;
        color: #f5f7fa;
      }
      .beat-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
      }
      #chyron {
        position: absolute;
        top: 56px;
        left: 56px;
        display: flex;
        align-items: baseline;
        gap: 18px;
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.32em;
        z-index: 20;
        pointer-events: none;
        opacity: 0;
      }
      #chyron .chyron-counter {
        color: #37bdf8;
        text-shadow: 0 0 12px rgba(55,189,248,0.5);
      }
      #chyron .chyron-sep { color: rgba(255,255,255,0.3); }
      #chyron .chyron-label {
        color: #f5f7fa;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 22px;
        letter-spacing: 0.2em;
      }
      #chyron .chyron-hot { color: #f09025; }
      #watermark {
        position: absolute;
        bottom: 36px;
        right: 48px;
        width: 72px;
        height: auto;
        opacity: 0.55;
        z-index: 21;
        filter: drop-shadow(0 0 8px rgba(55,189,248,0.3));
        pointer-events: none;
      }
      #watermark-tag {
        position: absolute;
        bottom: 48px;
        right: 132px;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 13px;
        letter-spacing: 0.22em;
        color: rgba(150, 162, 182, 0.65);
        z-index: 21;
        pointer-events: none;
      }
      .hide-on-outro {
        transition: opacity 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="hyperframes-sizzle"
      data-start="0"
      data-duration="75"
      data-width="1920"
      data-height="1080"
    >
      <!-- Beat 00 — Cold open (0-4s) -->
      <div class="beat-layer"
        data-composition-id="v00-cold-open"
        data-composition-src="compositions/v00-cold-open.html"
        data-start="0" data-duration="4" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 01 — Kinetic type (4-11s) -->
      <div class="beat-layer"
        data-composition-id="v01-kinetic-type"
        data-composition-src="compositions/v01-kinetic-type.html"
        data-start="4" data-duration="7" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 02 — Data chart (11-18s) -->
      <div class="beat-layer"
        data-composition-id="v02-data-chart"
        data-composition-src="compositions/v02-data-chart.html"
        data-start="11" data-duration="7" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 03 — App showcase (18-25s) -->
      <div class="beat-layer"
        data-composition-id="v03-app-showcase"
        data-composition-src="compositions/v03-app-showcase.html"
        data-start="18" data-duration="7" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 04 — Audio-reactive (25-33s) -->
      <div class="beat-layer"
        data-composition-id="v04-audio-reactive"
        data-composition-src="compositions/v04-audio-reactive.html"
        data-start="25" data-duration="8" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 05 — Website → Video (33-43s) -->
      <div class="beat-layer"
        data-composition-id="v05-web-to-video"
        data-composition-src="compositions/v05-web-to-video.html"
        data-start="33" data-duration="10" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 06 — Shader montage (43-50s): 2 shader blocks × 3.5s -->
      <div class="beat-layer"
        data-composition-id="swirl-vortex"
        data-composition-src="compositions/swirl-vortex.html"
        data-start="43" data-duration="3.5" data-track-index="0"
        data-width="1920" data-height="1080"></div>
      <div class="beat-layer"
        data-composition-id="chromatic-radial-split"
        data-composition-src="compositions/chromatic-radial-split.html"
        data-start="46.5" data-duration="3.5" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 07 — Social stack (50-56s) -->
      <div class="beat-layer"
        data-composition-id="v07-social-stack"
        data-composition-src="compositions/v07-social-stack.html"
        data-start="50" data-duration="6" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 08 — Caption sync (56-63s) -->
      <div class="beat-layer"
        data-composition-id="v08-caption-sync"
        data-composition-src="compositions/v08-caption-sync.html"
        data-start="56" data-duration="7" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 09 — Flowchart (63-69s) -->
      <div class="beat-layer"
        data-composition-id="v09-flowchart"
        data-composition-src="compositions/v09-flowchart.html"
        data-start="63" data-duration="6" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 10 — Logo outro (69-75s) -->
      <div class="beat-layer"
        data-composition-id="v10-logo-outro"
        data-composition-src="compositions/v10-logo-outro.html"
        data-start="69" data-duration="6" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Chyron overlay (changes per beat) -->
      <div id="chyron">
        <span class="chyron-counter" id="chyron-counter">01</span>
        <span class="chyron-sep">/</span>
        <span class="chyron-label" id="chyron-label">COLD OPEN</span>
      </div>

      <!-- Persistent AIS watermark + tag -->
      <img id="watermark" src="assets/ais-logo.png" alt="" />
      <div id="watermark-tag">AIS × HYPERFRAMES</div>

      <!-- Global music bed -->
      <audio
        id="music"
        data-start="0"
        data-duration="75"
        data-track-index="1"
        data-volume="0.65"
        src="assets/music.mp3"
      ></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Chyron labels per beat
      const chyronData = [
        { t: 0,    end: 4,  n: "01", label: "COLD", hot: "OPEN" },
        { t: 4,    end: 11, n: "02", label: "KINETIC", hot: "TYPE" },
        { t: 11,   end: 18, n: "03", label: "DATA", hot: "CHART" },
        { t: 18,   end: 25, n: "04", label: "APP", hot: "SHOWCASE" },
        { t: 25,   end: 33, n: "05", label: "AUDIO", hot: "REACTIVE" },
        { t: 33,   end: 43, n: "06", label: "WEBSITE →", hot: "VIDEO" },
        { t: 43,   end: 46.5, n: "07", label: "SHADER", hot: "VORTEX" },
        { t: 46.5, end: 50, n: "08", label: "CHROMATIC", hot: "SPLIT" },
        { t: 50,   end: 56, n: "09", label: "SOCIAL", hot: "OVERLAYS" },
        { t: 56,   end: 63, n: "10", label: "CAPTION", hot: "SYNC" },
        { t: 63,   end: 69, n: "11", label: "DETERMINISTIC", hot: "RENDER" },
        { t: 69,   end: 75, n: "12", label: "OUT", hot: "RO" },
      ];
      const counterEl = document.getElementById("chyron-counter");
      const labelEl = document.getElementById("chyron-label");
      chyronData.forEach((c, i) => {
        tl.call(() => {
          counterEl.textContent = c.n;
          labelEl.innerHTML = `${c.label} <span class="chyron-hot">${c.hot}</span>`;
        }, null, c.t);
        // Animate chyron in on beat start, out just before beat end (for a clean swap)
        tl.fromTo("#chyron", { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.35, ease: "power3.out" }, c.t + 0.1);
        // Hide chyron during logo outro (last beat)
        if (i === chyronData.length - 1) {
          tl.to("#chyron", { opacity: 0, duration: 0.4 }, c.t + 0.2);
          tl.to("#watermark", { opacity: 0, duration: 0.4 }, c.t + 0.2);
          tl.to("#watermark-tag", { opacity: 0, duration: 0.4 }, c.t + 0.2);
        } else if (i < chyronData.length - 1) {
          tl.to("#chyron", { opacity: 0, duration: 0.25, ease: "power2.in" }, c.end - 0.3);
        }
      });

      // Pad to 75s in case nothing else anchors the end
      tl.set({}, {}, 75);

      window.__timelines["hyperframes-sizzle"] = tl;
    </script>
  </body>
</html>
