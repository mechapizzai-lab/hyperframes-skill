<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>May Shorts 19 — Vertical</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #07121c;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      #face-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        transform-origin: 0 0;
        /* Initial: bottom-half mode (scene 1). scale 0.5625 = 1080/1920 renders full
           1920x1080 landscape frame at 1080x607.5; translate(0, 1136px) centers the
           607.5-tall video inside the 960-tall bottom half (176px navy above/below). */
        transform: translate(0px, 1136px) scale(0.5625);
        z-index: 0;
      }
      #face-video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform-origin: center center;
        /* Subtle short-form color grade: lift contrast, cool the shadows slightly,
           bump saturation so the face reads punchy against the navy bg. */
        filter: contrast(1.08) saturate(1.08) brightness(0.97);
      }
      #face-wrapper::after {
        /* Side vignette on the face so the edges sink into the surrounding navy
           instead of butting against a razor edge. Placed inside the wrapper so
           it scales with the face in both BOTTOM and FULLSCREEN modes. */
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          transparent 55%,
          rgba(7, 18, 28, 0.35) 85%,
          rgba(7, 18, 28, 0.7) 100%
        );
      }
      .scene-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="18.84"
      data-width="1080"
      data-height="1920"
    >
      <!-- Ambient background layer — sits below face and scenes, provides depth
           (radial gradient + drifting grid + particles + vignette) so the frame
           never reads as flat solid navy. -->
      <div
        id="ambient-bg"
        class="scene-layer"
        data-composition-id="ambient-bg"
        data-composition-src="compositions/ambient-bg.html"
        data-start="0"
        data-duration="18.84"
        data-track-index="3"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Face video wrapped in a non-timed div. Wrapper sized at source's native
           landscape aspect (1920x1080). GSAP transforms the wrapper between
           bottom-half (scale 0.5625, whole landscape frame fits in bottom 960px)
           and full-screen (scale 1.7778, cropped-cover style fills 1080x1920). -->
      <div id="face-wrapper">
        <video
          id="face-video"
          data-start="0"
          data-duration="18.84"
          data-track-index="0"
          src="assets/may_shorts_19-edit.mp4"
          muted
          playsinline
        ></video>
      </div>

      <!-- Seam treatment — feathers the hard y=960 edge between panel and face.
           Only visible during bottom-half scenes (1, 2, 5, 7). Drawn after the
           face so it sits on top; scene panels rendered later will cover it when
           they take over the whole screen. -->
      <div
        id="seam-treatment"
        class="scene-layer"
        data-composition-id="seam-treatment"
        data-composition-src="compositions/seam-treatment.html"
        data-start="0"
        data-duration="18.84"
        data-track-index="5"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Audio (separate track so the mixer can manage it) -->
      <audio
        id="face-audio"
        data-start="0"
        data-duration="18.84"
        data-track-index="4"
        data-volume="1"
        src="assets/may_shorts_19-edit.mp4"
      ></audio>

      <!-- Scene overlays -->
      <!--
        Scene start times are audio-synced to the internal local-time designs
        of each composition. See the comments inside each scene HTML for the
        master-time each animation expects. Do NOT shift these without also
        updating the scene composition files.
      -->
      <div
        id="scene-1"
        class="scene-layer"
        data-composition-id="scene1-intro"
        data-composition-src="compositions/scene1-intro.html"
        data-start="0"
        data-duration="2.15"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-2"
        class="scene-layer"
        data-composition-id="scene2-rejection"
        data-composition-src="compositions/scene2-rejection.html"
        data-start="2.15"
        data-duration="2.53"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-3"
        class="scene-layer"
        data-composition-id="scene3-pointless"
        data-composition-src="compositions/scene3-pointless.html"
        data-start="4.68"
        data-duration="1.50"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-4"
        class="scene-layer"
        data-composition-id="scene4-six"
        data-composition-src="compositions/scene4-six.html"
        data-start="6.18"
        data-duration="2.25"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-5"
        class="scene-layer"
        data-composition-id="scene5-benefits"
        data-composition-src="compositions/scene5-benefits.html"
        data-start="8.43"
        data-duration="3.95"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-6"
        class="scene-layer"
        data-composition-id="scene6-only-ones"
        data-composition-src="compositions/scene6-only-ones.html"
        data-start="12.38"
        data-duration="3.05"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <div
        id="scene-7"
        class="scene-layer"
        data-composition-id="scene7-cta"
        data-composition-src="compositions/scene7-cta.html"
        data-start="15.43"
        data-duration="3.41"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Captions -->
      <div
        id="captions"
        class="scene-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="18.84"
        data-track-index="2"
        data-width="1080"
        data-height="1920"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // Face-wrapper modes. Wrapper is 1920x1080 (source native).
      //   BOTTOM: scale 0.5625 -> 1080x607.5, positioned at y=1136 (centered in bottom 960).
      //   FULLSCREEN: scale 1.7778, positioned at x=-1166.5 to horizontally center-crop
      //     the landscape source into the 1080x1920 canvas (matches original cover behaviour).
      const BOTTOM = { x: 0, y: 1136, scale: 0.5625 };
      const FULLSCREEN = { x: -1166.5, y: 0, scale: 1.7778 };
      const MODE_DUR = 0.32;

      // Initial state — start in BOTTOM, no animation needed for scene 1.
      mainTl.set("#face-wrapper", BOTTOM, 0);

      // Mode changes at scene boundaries. Times are audio-synced scene starts.
      // Animate with expo.inOut so the motion hides the transition; kick off 0.15s
      // BEFORE the new scene's content lands so the face has settled by then.
      [
        { t: 6.18, mode: FULLSCREEN }, // scene 4 needs fullscreen face
        { t: 8.43, mode: BOTTOM },     // scene 5 back to bottom-half
        { t: 12.38, mode: FULLSCREEN },// scene 6 fullscreen for CTA lead-in
        { t: 15.43, mode: BOTTOM },    // scene 7 back to bottom-half for comment prompt
      ].forEach(({ t, mode }) => {
        mainTl.to(
          "#face-wrapper",
          { ...mode, duration: MODE_DUR, ease: "expo.inOut" },
          t - 0.15,
        );
      });

      // Ken Burns — subtle zoom on the face over the full duration. Adds
      // perceptible "camera" motion so the face doesn't feel like a still cutout.
      mainTl.to(
        "#face-video",
        { scale: 1.025, duration: 18.84, ease: "none" },
        0,
      );

      // Pad so duration matches data-duration exactly.
      mainTl.set({}, {}, 18.84);
      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
