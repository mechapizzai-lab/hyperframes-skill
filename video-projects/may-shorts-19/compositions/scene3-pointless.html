<template id="scene3-pointless-template">
  <div
    data-composition-id="scene3-pointless"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="1.50"
  >
    <div class="s3-panel">
      <div class="s3-cool" id="s3-cool">COOL</div>
      <svg class="s3-sparks" viewBox="0 0 1080 1920" id="s3-sparks">
        <g stroke="#37bdf8" stroke-width="5" stroke-linecap="round">
          <line class="s3-spark" x1="240" y1="720" x2="290" y2="720" />
          <line class="s3-spark" x1="820" y1="760" x2="880" y2="760" />
          <line class="s3-spark" x1="180" y1="1080" x2="140" y2="1040" />
          <line class="s3-spark" x1="900" y1="1060" x2="940" y2="1100" />
          <line class="s3-spark" x1="540" y1="620" x2="540" y2="660" />
          <line class="s3-spark" x1="540" y1="1160" x2="540" y2="1200" />
        </g>
      </svg>

      <div class="s3-pointless-wrap" id="s3-pointless-wrap">
        <div class="s3-ghost s3-ghost-red" id="s3-ghost-r">POINTLESS</div>
        <div class="s3-ghost s3-ghost-cyan" id="s3-ghost-c">POINTLESS</div>
        <div class="s3-pointless" id="s3-pointless">POINTLESS</div>
        <div class="s3-strike" id="s3-strike"></div>
      </div>
    </div>

    <style>
      [data-composition-id="scene3-pointless"] {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene3-pointless"] .s3-panel {
        position: absolute;
        inset: 0;
        background: #07121c;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
      }
      [data-composition-id="scene3-pointless"] .s3-cool {
        position: absolute;
        font-weight: 900;
        font-size: 260px;
        color: #8de1ff;
        text-shadow:
          0 0 30px rgba(55, 189, 248, 0.75),
          0 0 80px rgba(55, 189, 248, 0.4);
        letter-spacing: -0.02em;
        opacity: 0;
        transform: scale(0.6);
      }
      [data-composition-id="scene3-pointless"] .s3-sparks {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      [data-composition-id="scene3-pointless"] .s3-spark {
        transform-origin: center;
        opacity: 0;
      }
      [data-composition-id="scene3-pointless"] .s3-pointless-wrap {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-composition-id="scene3-pointless"] .s3-pointless,
      [data-composition-id="scene3-pointless"] .s3-ghost {
        font-weight: 900;
        font-size: 168px;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      [data-composition-id="scene3-pointless"] .s3-pointless {
        color: #f09025;
        text-shadow: 0 2px 0 #07121c;
        opacity: 0;
        transform: scale(0.7);
      }
      [data-composition-id="scene3-pointless"] .s3-ghost {
        position: absolute;
        opacity: 0;
      }
      [data-composition-id="scene3-pointless"] .s3-ghost-red {
        color: #ff3b3b;
        transform: translate(-4px, 0);
      }
      [data-composition-id="scene3-pointless"] .s3-ghost-cyan {
        color: #22d3ee;
        transform: translate(4px, 0);
      }
      [data-composition-id="scene3-pointless"] .s3-strike {
        position: absolute;
        left: -20px;
        right: -20px;
        top: 50%;
        height: 18px;
        background: #f09025;
        transform: translateY(-50%) scaleX(0);
        transform-origin: left center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene3-pointless"] ';

        // Scene starts at 4.68s master. "cool" word @ 4.92 master -> local 0.24.
        // Bring COOL in at local 0 so the panel isn't blank during 0–0.24s.
        tl.to(
          scope + "#s3-cool",
          { opacity: 1, scale: 1, duration: 0.28, ease: "back.out(2.5)" },
          0,
        );
        tl.to(
          scope + ".s3-spark",
          { opacity: 1, scale: 1.3, duration: 0.22, ease: "power3.out", stagger: 0.03 },
          0.3,
        );
        tl.to(
          scope + ".s3-spark",
          { opacity: 0, duration: 0.3, ease: "power2.in" },
          0.7,
        );

        // Glitch shake on COOL right before swap (word "pointless" @ 6.58 -> local 0.78s)
        tl.to(
          scope + "#s3-cool",
          { x: -18, duration: 0.04, ease: "power1.in", yoyo: true, repeat: 3 },
          0.7,
        );
        tl.to(scope + "#s3-cool", { opacity: 0, scale: 0.8, duration: 0.06 }, 0.78);

        // POINTLESS slams in at 0.78
        tl.to(
          scope + "#s3-pointless",
          { opacity: 1, scale: 1, duration: 0.18, ease: "back.out(2.0)" },
          0.78,
        );
        tl.to(
          scope + "#s3-ghost-r",
          { opacity: 0.85, duration: 0.05 },
          0.78,
        );
        tl.to(
          scope + "#s3-ghost-c",
          { opacity: 0.85, duration: 0.05 },
          0.78,
        );
        tl.to(
          scope + "#s3-ghost-r",
          { opacity: 0, duration: 0.12, ease: "power2.in" },
          0.9,
        );
        tl.to(
          scope + "#s3-ghost-c",
          { opacity: 0, duration: 0.12, ease: "power2.in" },
          0.9,
        );

        // Strike-through
        tl.to(
          scope + "#s3-strike",
          { scaleX: 1, duration: 0.15, ease: "power3.out" },
          0.88,
        );

        tl.set({}, {}, 1.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene3-pointless"] = tl;
      })();
    </script>
  </div>
</template>
