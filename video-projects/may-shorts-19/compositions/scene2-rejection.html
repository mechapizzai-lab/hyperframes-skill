<template id="scene2-rejection-template">
  <div
    data-composition-id="scene2-rejection"
    data-start="0"

    data-height="1920"

  >
    <div class="s2-panel">
      <div class="s2-grid">
        <div class="s2-chip">commit-writer</div>
        <div class="s2-chip">doc-gen</div>
        <div class="s2-chip">pr-review</div>
        <div class="s2-chip">shader-vfx</div>
        <div class="s2-chip">test-runner</div>
        <div class="s2-chip">refactor</div>
        <div class="s2-chip">chart-gen</div>
        <div class="s2-chip">tts-narrate</div>
        <div class="s2-chip">seed-data</div>
      </div>

      <svg class="s2-x" viewBox="0 0 900 600" preserveAspectRatio="none">
        <line
          id="s2-x1"
          x1="40"
          y1="40"
          x2="860"
          y2="560"
          stroke="#f09025"
          stroke-width="28"
          stroke-linecap="round"
          pathLength="1"
          stroke-dasharray="1"
          stroke-dashoffset="1"
        />
        <line
          id="s2-x2"
          x1="860"
          y1="40"
          x2="40"
          y2="560"
          stroke="#f09025"
          stroke-width="28"
          stroke-linecap="round"
          pathLength="1"
          stroke-dasharray="1"
          stroke-dashoffset="1"
        />
      </svg>

      <div class="s2-stamp">NO BUSINESS NEEDS THIS</div>
    </div>

    <style>
      [data-composition-id="scene2-rejection"] {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene2-rejection"] .s2-panel {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 960px;
        background: #07121c;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
      }
      [data-composition-id="scene2-rejection"] .s2-grid {
        position: absolute;
        inset: 80px 60px 150px 60px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 16px;
      }
      [data-composition-id="scene2-rejection"] .s2-chip {
        background: #0d2031;
        border: 1px solid #252d33;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #96a2b6;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 30px;
        letter-spacing: 0.02em;
        opacity: 0;
      }
      [data-composition-id="scene2-rejection"] .s2-x {
        position: absolute;
        inset: 60px 40px 130px 40px;
        width: calc(100% - 80px);
        height: calc(100% - 190px);
        pointer-events: none;
      }
      [data-composition-id="scene2-rejection"] .s2-stamp {
        position: absolute;
        bottom: 40px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 72px;
        letter-spacing: -0.01em;
        color: #f09025;
        text-shadow: 0 2px 0 #07121c;
        opacity: 0;
        transform: scale(0.7);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene2-rejection"] ';

        // Grid chips stagger entry (scene starts at edited master 2.15s; these times are LOCAL).
        tl.to(
          scope + ".s2-chip",
          {
            opacity: 1,
            y: 0,
            duration: 0.35,
            ease: "power2.out",
            stagger: 0.08,
          },
          0.1,
        );

        // X slashes at edited master t=2.88s ("no") → local t=0.73s
        tl.to(
          scope + "#s2-x1",
          { strokeDashoffset: 0, duration: 0.22, ease: "power3.out" },
          0.73,
        );
        tl.to(
          scope + "#s2-x2",
          { strokeDashoffset: 0, duration: 0.22, ease: "power3.out" },
          0.88,
        );
        // Chips dim
        tl.to(
          scope + ".s2-chip",
          { opacity: 0.28, duration: 0.18, ease: "power2.out" },
          1.03,
        );
        // Stamp lands at edited master t=3.46s ("business") → local t=1.31s
        tl.to(
          scope + ".s2-stamp",
          { opacity: 1, scale: 1, duration: 0.32, ease: "back.out(2.2)" },
          1.31,
        );
        tl.set({}, {}, 2.53);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene2-rejection"] = tl;
      })();
    </script>
  </div>
</template>
