<template id="scene1-intro-template">
  <div
    data-composition-id="scene1-intro"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="2.15"
  >
    <div class="s1-panel">
      <div class="s1-label">I TESTED</div>
      <div class="s1-big">
        <span class="s1-counter" id="s1-counter">0</span><span class="s1-plus" id="s1-plus">+</span>
      </div>
      <div class="s1-stamp" id="s1-stamp">
        <span>CLAUDE CODE SKILLS</span>
        <span class="s1-underline" id="s1-underline"></span>
      </div>
    </div>

    <style>
      [data-composition-id="scene1-intro"] {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene1-intro"] .s1-panel {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 960px;
        background: #07121c;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding: 60px 80px;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
      }
      [data-composition-id="scene1-intro"] .s1-label {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 52px;
        letter-spacing: 0.18em;
        color: #96a2b6;
        opacity: 0;
      }
      [data-composition-id="scene1-intro"] .s1-big {
        display: flex;
        align-items: baseline;
        gap: 16px;
        color: #37bdf8;
        font-weight: 900;
        font-size: 400px;
        line-height: 0.9;
        letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums;
      }
      [data-composition-id="scene1-intro"] .s1-plus {
        font-size: 260px;
        color: #f09025;
        opacity: 0;
        transform: scale(0);
      }
      [data-composition-id="scene1-intro"] .s1-stamp {
        position: relative;
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 64px;
        letter-spacing: 0.04em;
        color: #ffffff;
        clip-path: inset(0 100% 0 0);
      }
      [data-composition-id="scene1-intro"] .s1-underline {
        position: absolute;
        left: 0;
        bottom: -14px;
        height: 4px;
        width: 100%;
        background: #37bdf8;
        transform: scaleX(0);
        transform-origin: left center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const counter = { val: 0 };
        const el = document.querySelector('[data-composition-id="scene1-intro"] .s1-counter');

        tl.to(
          '[data-composition-id="scene1-intro"] .s1-label',
          { opacity: 1, duration: 0.35, ease: "power2.out" },
          0.1,
        );
        tl.to(
          counter,
          {
            val: 100,
            duration: 0.4,
            ease: "power2.out",
            snap: { val: 1 },
            onUpdate: function () {
              if (el) el.textContent = Math.round(counter.val);
            },
          },
          0.32,
        );
        tl.to(
          '[data-composition-id="scene1-intro"] .s1-plus',
          { opacity: 1, scale: 1, duration: 0.28, ease: "back.out(3)" },
          0.75,
        );
        tl.to(
          '[data-composition-id="scene1-intro"] .s1-stamp',
          { clipPath: "inset(0 0% 0 0)", duration: 0.28, ease: "power3.out" },
          1.0,
        );
        tl.to(
          '[data-composition-id="scene1-intro"] .s1-underline',
          { scaleX: 1, duration: 0.3, ease: "power2.out" },
          1.4,
        );
        tl.set({}, {}, 2.15);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-intro"] = tl;
      })();
    </script>
  </div>
</template>
