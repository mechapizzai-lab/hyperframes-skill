<template id="scene6-only-ones-template">
  <div
    data-composition-id="scene6-only-ones"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="3.05"
  >
    <!-- Code chip, top-left -->
    <div class="s6-chip" id="s6-chip">
      <span class="s6-chip-dot"></span>
      <span class="s6-chip-text" id="s6-chip-text"></span>
      <span class="s6-chip-caret" id="s6-chip-caret">▋</span>
    </div>

    <!-- ONLY ONES stamp -->
    <div class="s6-stamp" id="s6-stamp">THE ONLY ONES</div>

    <!-- THAT MATTER. -->
    <div class="s6-matter" id="s6-matter">THAT MATTER.</div>

    <style>
      [data-composition-id="scene6-only-ones"] {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      [data-composition-id="scene6-only-ones"] .s6-chip {
        position: absolute;
        top: 100px;
        left: 80px;
        padding: 18px 26px;
        background: #0d2031;
        border: 2px solid #37bdf8;
        border-radius: 14px;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 34px;
        color: #37bdf8;
        display: flex;
        align-items: center;
        gap: 14px;
        opacity: 0;
      }
      [data-composition-id="scene6-only-ones"] .s6-chip-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #37bdf8;
        box-shadow: 0 0 12px #37bdf8;
      }
      [data-composition-id="scene6-only-ones"] .s6-chip-caret {
        color: #37bdf8;
      }
      [data-composition-id="scene6-only-ones"] .s6-stamp {
        position: absolute;
        top: 260px;
        left: 50%;
        transform: translateX(-50%) scale(1.2) rotate(-5deg);
        padding: 22px 44px;
        border: 4px solid #37bdf8;
        border-radius: 16px;
        background: rgba(7, 18, 28, 0.88);
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 92px;
        letter-spacing: -0.015em;
        color: #37bdf8;
        text-shadow: 0 3px 0 #07121c;
        opacity: 0;
        white-space: nowrap;
      }
      [data-composition-id="scene6-only-ones"] .s6-matter {
        position: absolute;
        top: 440px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 96px;
        color: #ffffff;
        letter-spacing: -0.015em;
        text-shadow:
          0 4px 0 #07121c,
          0 8px 24px rgba(7, 18, 28, 0.9);
        opacity: 0;
        transform: translateY(20px);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const scope = '[data-composition-id="scene6-only-ones"] ';
        const chipEl = document.querySelector(scope + "#s6-chip-text");
        const fullText = "$ claude build";

        // Scene starts at 13.50s on master. Bring chip in at local 0.05 so the
        // frame has motion immediately after the face-mode interpolation to
        // FULLSCREEN completes (~13.67 master).
        tl.to(
          scope + "#s6-chip",
          { opacity: 1, duration: 0.2, ease: "power2.out" },
          0.05,
        );
        // Type on effect ~0.04s per char
        for (let i = 1; i <= fullText.length; i++) {
          tl.call(
            function (n) {
              if (chipEl) chipEl.textContent = fullText.slice(0, n);
            },
            [i],
            0.1 + i * 0.04,
          );
        }
        // Blinking caret (finite repeat)
        const caretCycle = 0.5;
        const caretDuration = 2.3;
        tl.to(
          scope + "#s6-chip-caret",
          {
            opacity: 0,
            duration: caretCycle / 2,
            ease: "steps(1)",
            repeat: Math.ceil(caretDuration / caretCycle) * 2 - 1,
            yoyo: true,
          },
          0.5,
        );

        // "only ones" @ 15.54 -> local 2.04
        tl.to(
          scope + "#s6-stamp",
          {
            opacity: 1,
            scale: 1,
            rotation: -5,
            duration: 0.26,
            ease: "back.out(2.5)",
          },
          2.04,
        );
        // "matter" @ 16.12 -> local 2.62
        tl.to(
          scope + "#s6-matter",
          { opacity: 1, y: 0, duration: 0.22, ease: "expo.out" },
          2.62,
        );

        tl.set({}, {}, 3.05);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene6-only-ones"] = tl;
      })();
    </script>
  </div>
</template>
